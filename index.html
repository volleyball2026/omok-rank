function ogBoardFromMoves(moves){
  const b = Omok.createBoard();
  moves.forEach((m,i)=> b[m[0]][m[1]] = i%2===0 ? Omok.BLACK : Omok.WHITE);
  return b;
}
function stoneStyle(st){
  return `background:radial-gradient(circle at 35% 32%, ${st.in}, ${st.out});` + (st.glow?`box-shadow:0 0 6px ${st.glow};`:"border:1px solid rgba(0,0,0,.15);");
}
function renderOnlineBoard(row){
  if(row.game_type === "chess") return renderOnlineChessBoard(row);
  if(row.game_type === "janggi") return renderOnlineJanggiBoard(row);
  const el = document.getElementById("olBoard"); if(!el) return;
  const N = Omok.N, b = ogBoardFromMoves(row.moves);
  const last = row.moves.length ? row.moves[row.moves.length-1] : null;
  const myTurn = row.status==="playing" && (row.turn==="black"?Omok.BLACK:Omok.WHITE)===og.myColor;
  // 구입 스킨 연동 (#4): 흑/백 플레이어의 장착 스킨
  const blackId = row.host_color==="black"?row.host_id:row.guest_id;
  const whiteId = row.host_color==="black"?row.guest_id:row.host_id;
  const bp = students.find(s=>s.id===blackId), wp = students.find(s=>s.id===whiteId);
  const boardSkin = (bp && hasCustomBoard(bp) && SHOP[bp.equip_board] && SHOP[bp.equip_board].data)
                 || (wp && hasCustomBoard(wp) && SHOP[wp.equip_board] && SHOP[wp.equip_board].data) || DEFAULT_BOARD;
  const stB = resolveStone(bp?bp.equip_stone:null,"black"), stW = resolveStone(wp?wp.equip_stone:null,"white");
  let h = `<div class="rgrid romok" style="${omokGridStyle("min(88vmin,380px)", boardSkin)}">`;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    let cls = (isStar(r,c) && !b[r][c]) ? " star" : "";
    if(last && last[0]===r && last[1]===c) cls += " rlast";
    const inner = b[r][c] ? `<span class="rstone" style="${stoneStyle(b[r][c]===Omok.BLACK?stB:stW)}"></span>` : "";
    h += `<div class="rsq${cls}" onclick="onlineClick(${r},${c})">${inner}</div>`;
  }
  el.innerHTML = h + `</div>`;
  const msg = document.getElementById("olMsg");
  if(msg && row.status==="playing") msg.textContent = myTurn ? "🟢 내 차례예요!" : "⏳ 상대가 두는 중…";
  updateOnlineClock();
}
async function onlineClick(r,c){
  const row = og && og.row;
  if(!row || row.status!=="playing") return;
  if((row.turn==="black"?Omok.BLACK:Omok.WHITE)!==og.myColor) return;   // 내 차례 아님
  const b = ogBoardFromMoves(row.moves);
  if(b[r][c]!==Omok.EMPTY) return;
  const res = Omok.analyze(b, r, c, og.myColor);
  if(og.myColor===Omok.BLACK && res.forbidden){ document.getElementById("olMsg").textContent = `❌ 금수: ${res.forbidden} — 다른 곳에`; return; }
  let end=null, winner=null, result=null;
  if(res.win){ end="done"; winner=onlineMe.id; result="win"; }
  else { b[r][c]=og.myColor; if(Omok.isFull(b)){ end="done"; result="draw"; } }
  try {
    sfx.place();
    const { data, error } = await sb.rpc("og_move",{p_id:og.id,p_player_id:onlineMe.id,p_move:[r,c],p_end:end,p_winner_id:winner,p_result:result});
    if(error) throw new Error(error.message);
    og.row=data; renderOnlineBoard(data);
    if(data.status==="done") onlineGameOver(data);
  } catch(e){ document.getElementById("olMsg").textContent = e.message; }
}

function renderOnlineChessBoard(row){
  const el = document.getElementById("olBoard"); if(!el) return;
  const st = onlineChessState(row);
  const myC = myOnlineSide(row)==="white" ? "w" : "b";
  const myTurn = row.status==="playing" && st.turn===myC;
  const legalSet = new Set((og.legal||[]).map(m=>m[0]+","+m[1]));
  const last = row.moves.length ? row.moves[row.moves.length-1] : null;
  const chk = row.status==="playing" && Chess.inCheck(st.board, st.turn) ? Chess.kingPos(st.board, st.turn) : null;
  // 내가 흑이면 판을 180° 돌려서 '내 진영이 항상 아래'가 되게 한다 (board[0]이 흑 진영이라 기본은 백 시점)
  const flip = myC === "b";
  let h = `<div class="rgrid rchess" style="grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);aspect-ratio:1;width:min(88vmin,380px)">`;
  for(let dr=0;dr<8;dr++) for(let dc=0;dc<8;dc++){
    const r = flip ? 7-dr : dr, c = flip ? 7-dc : dc;
    const p = st.board[r][c];
    let cls = "rsq " + ((r+c)%2 ? "dark":"light");
    if(og.sel && og.sel[0]===r && og.sel[1]===c) cls += " sel";
    if(legalSet.has(r+","+c)) cls += " legal" + (p ? " cap" : "");
    if(last && ((last[0]===r&&last[1]===c)||(last[2]===r&&last[3]===c))) cls += " rlast";
    if(chk && chk[0]===r && chk[1]===c) cls += " chk";
    const inner = p ? `<span class="${Chess.colorOf(p)==='w'?'rc':'rcb'}">${CG[Chess.typeOf(p)]}</span>` : "";
    h += `<div class="${cls}" onclick="chessOnlineClick(${r},${c})">${inner}</div>`;
  }
  el.innerHTML = h + `</div>`;
  const msg = document.getElementById("olMsg");
  if(msg && row.status==="playing"){
    const chkTxt = Chess.inCheck(st.board, st.turn) ? " · ⚠️ 장군!" : "";
    msg.textContent = (myTurn ? "🟢 내 차례예요!" : "⏳ 상대가 두는 중…") + chkTxt;
  }
  updateOnlineClock();
}
function chessOnlineClick(r,c){
  const row = og && og.row;
  if(!row || row.status!=="playing" || row.game_type!=="chess") return;
  const st = onlineChessState(row);
  const myC = myOnlineSide(row)==="white" ? "w" : "b";
  if(st.turn !== myC) return;                       // 내 차례 아님
  if(og.sel && (og.legal||[]).some(m=>m[0]===r && m[1]===c)){
    const from = og.sel, to = [r,c];
    if(Chess.isPromotion(st, from, to)){            // 승격 선택
      pendingPromo = { from, to, online:true };
      og.sel=null; og.legal=[]; renderOnlineBoard(row);
      document.getElementById("promoPicker").classList.add("show");
      return;
    }
    sendChessOnlineMove(from, to, null); return;
  }
  const p = st.board[r][c];
  if(p && Chess.colorOf(p)===myC){ og.sel=[r,c]; og.legal=Chess.legalMoves(st,r,c); }
  else { og.sel=null; og.legal=[]; }
  renderOnlineBoard(row);
}
async function sendChessOnlineMove(from, to, promo){
  const row = og.row, st = onlineChessState(row);
  const next = Chess.applyMove(st, from, to, promo);
  const stt = Chess.status(next);
  let end=null, winner=null, result=null;
  if(stt==="checkmate"){ end="done"; winner=onlineMe.id; result="win"; }
  else if(stt==="stalemate"){ end="done"; result="draw"; }
  og.sel=null; og.legal=[];
  try {
    sfx.place();
    const { data, error } = await sb.rpc("og_move",{p_id:og.id,p_player_id:onlineMe.id,
      p_move:[from[0],from[1],to[0],to[1],promo||null], p_end:end, p_winner_id:winner, p_result:result});
    if(error) throw new Error(error.message);
    og.row=data; renderOnlineBoard(data);
    if(data.status==="done") onlineGameOver(data);
  } catch(e){ const m=document.getElementById("olMsg"); if(m) m.textContent=e.message; }
}

function onlineJanggiState(row){
  let s = Janggi.initialState();
  row.moves.forEach(m => { s = Janggi.applyMove(s, [m[0],m[1]], [m[2],m[3]]).state; });
  return s;
}
function renderOnlineJanggiBoard(row){
  const el = document.getElementById("olBoard"); if(!el) return;
  const st = onlineJanggiState(row), b = st.board;
  const myC = myOnlineSide(row)==="white" ? "r" : "b";
  const myTurn = row.status==="playing" && st.turn===myC;
  const legalSet = new Set((og.legal||[]).map(m=>m[0]+","+m[1]));
  const last = row.moves.length ? row.moves[row.moves.length-1] : null;
  const flip = myC === "b";   // 초 플레이어는 판을 뒤집어 자기 진영이 아래로
  // 스킨: 한(white 슬롯)/초(black 슬롯) 플레이어의 장착 스킨
  const redId  = row.host_color==="white" ? row.host_id : row.guest_id;
  const blueId = row.host_color==="white" ? row.guest_id : row.host_id;
  const rp = students.find(s=>s.id===redId), bp = students.find(s=>s.id===blueId);
  const bd = resolveJanggiBoard(rp, bp);
  const jpR = resolveJanggiPiece(rp,"r"), jpB = resolveJanggiPiece(bp,"b");
  let h = `<div class="rgrid" style="grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(10,1fr);aspect-ratio:9/10;width:min(80vmin,340px);background:${bd.bg};border-color:${bd.border}">`;
  for(let dr=0;dr<10;dr++) for(let dc=0;dc<9;dc++){
    const r = flip ? 9-dr : dr, c = flip ? 8-dc : dc;
    const p = b[r][c];
    let cls = "rsq jsq" + (Janggi.inPalace(r,c) ? " palace" : "");
    if(og.sel && og.sel[0]===r && og.sel[1]===c) cls += " sel";
    if(legalSet.has(r+","+c)) cls += " legal" + (p ? " cap" : "");
    if(last && ((last[0]===r&&last[1]===c)||(last[2]===r&&last[3]===c))) cls += " rlast";
    let inner = "";
    if(p){ const side=Janggi.col(p), jp=side==="r"?jpR:jpB;
      const glow = jp.glow ? `;box-shadow:0 1px 2px rgba(0,0,0,.3),0 0 7px ${jp.glow}` : "";
      inner = `<div class="jpiece ${side==="r"?"jr":"jb"}" style="background:${jp.disk};color:${jp.text};border-color:${jp.border}${glow}">${JG[side][Janggi.typ(p)]}</div>`; }
    h += `<div class="${cls}" style="border-color:${bd.line}" onclick="janggiOnlineClick(${r},${c})">${inner}</div>`;
  }
  el.innerHTML = h + `</div>`;
  const msg = document.getElementById("olMsg");
  if(msg && row.status==="playing") msg.textContent = myTurn ? "🟢 내 차례예요!" : "⏳ 상대가 두는 중…";
  updateOnlineClock();
}
function janggiOnlineClick(r,c){
  const row = og && og.row;
  if(!row || row.status!=="playing" || row.game_type!=="janggi") return;
  const st = onlineJanggiState(row);
  const myC = myOnlineSide(row)==="white" ? "r" : "b";
  if(st.turn !== myC) return;                       // 내 차례 아님
  if(og.sel && (og.legal||[]).some(m=>m[0]===r && m[1]===c)){ sendJanggiOnlineMove(og.sel, [r,c]); return; }

async function sendJanggiOnlineMove(from, to){
  const row = og.row, st = onlineJanggiState(row);
  const { captured } = Janggi.applyMove(st, from, to);

  try {

      p_move:[from[0],from[1],to[0],to[1]], p_end:end, p_winner_id:winner, p_result:result});

    og.row=data; renderOnlineBoard(data);

}
async function onlineResign(){
  const row = og && og.row;
  if(!row || row.status!=="playing") return;
  if(!confirm("기권할까요? 상대가 승리합니다.")) return;
  const winner = og.role==="host" ? row.guest_id : row.host_id;
  const { data } = await sb.rpc("og_finish",{p_id:og.id,p_winner_id:winner,p_result:"resign"});
  if(data){ og.row=data; onlineGameOver(data); }
}
async function onlineGameOver(row){
  if(ogClockTimer){ clearInterval(ogClockTimer); ogClockTimer=null; }
  const msg = document.getElementById("olMsg");
  if(msg){
    let txt;
    if(row.result==="draw") txt="🤝 무승부!";
    else { const iWon = row.winner_id===onlineMe.id; txt = (iWon?"🎉 승리!":"😢 패배") + (row.result==="resign"?" (기권)":row.result==="timeout"?" (시간패)":""); if(iWon) playVictory(students.find(s=>s.id===onlineMe.id)); }
    const tester = [row.host_id, row.guest_id].some(id => {
      const s = students.find(x => x.id === id); return s && s.is_tester;
    });
    const mode = !row.ranked ? " · 🤝 친선전 (랭킹 미반영)"
      : tester ? " · 🤝 친선전 — 🧪 테스터가 있어 랭킹 미반영" : " · 🏆 랭킹전";
    msg.innerHTML = `<b>${txt}</b><span style="font-size:12px;color:var(--sub)">${mode}</span>`;
  }
  const rb = document.getElementById("olResign"); if(rb){ rb.textContent="나가기"; rb.onclick=onlineLeave; }
  updateRematchBtn(row);
  try {
    const { data: claimed } = await sb.rpc("og_claim_record",{p_id:row.id});   // 결과·복기 1회만 기록
    if(claimed){
      let lp = null;
      const isDraw = row.result==="draw" || !row.winner_id;
      // 테스터가 끼면 서버가 record_match를 거부한다 → 로컬 대국과 똑같이 친선전으로 기록해야 표시가 정직하다
      const testerInvolved = [row.host_id, row.guest_id].some(id => {
        const s = students.find(x => x.id === id); return s && s.is_tester;
      });
      let rankedRec = !!row.ranked && !testerInvolved;
      if(rankedRec && !isDraw){
        const loser = row.winner_id===row.host_id ? row.guest_id : row.host_id;
        try {
          const r = await recordMatch(row.winner_id, loser);
          lp = r.winner.lp_change;
        } catch(e){ rankedRec = false; }   // 리매치 제한 등으로 실제 반영이 안 됐으면 친선전으로 남긴다
        loadStudents();
      }
      // 복기 저장: p1 = 선공(오목:흑 / 체스:백 / 장기:한=white)
      const firstSide = row.game_type==="omok" ? "black" : "white";
      const hostFirst = row.host_color===firstSide;
      const p1 = { id: hostFirst?row.host_id:row.guest_id, name: hostFirst?row.host_name:row.guest_name };
      const p2 = { id: hostFirst?row.guest_id:row.host_id, name: hostFirst?row.guest_name:row.host_name };
      saveGameRecord(row.game_type, p1, p2,
        isDraw?null:row.winner_id, isDraw?"draw":"win", row.moves,
        { ranked: rankedRec, online: true, lp });
    }
  } catch(e){}
}
function onlineLeave(){
  og=null; ogUnsub(); localStorage.removeItem("og_active"); closeModal("onlineBack");
}

  const d = document.createElement("div");
  d.className = "chat-line" + (mine?" mine":"");
  d.innerHTML = `<b>${esc(name)}</b> ${esc(text)}`;

function updateOnlineClock(){
  const row = og && og.row; if(!row || row.time_main<=0) return;
  const meEl = document.getElementById("olClkMe"), oppEl = document.getElementById("olClkOpp"); if(!meEl) return;
  const now = Date.now();
  const lastAt = row.last_move_at ? new Date(row.last_move_at).getTime() : now;
  const hostToMove = (row.turn === row.host_color);   // 현재 차례가 방장인가
  let hostMs = row.host_ms, guestMs = row.guest_ms;
  if(row.status==="playing"){ if(hostToMove) hostMs -= (now-lastAt); else guestMs -= (now-lastAt); }
  const iAmHost = og.role==="host";
  const myMs = iAmHost?hostMs:guestMs, oppMs = iAmHost?guestMs:hostMs;
  meEl.textContent = "⏱ "+fmtClock(Math.max(0,myMs)); oppEl.textContent = "⏱ "+fmtClock(Math.max(0,oppMs));
  const myTurn = (hostToMove===iAmHost) && row.status==="playing";
  meEl.classList.toggle("run", myTurn); oppEl.classList.toggle("run", !myTurn && row.status==="playing");
  meEl.classList.toggle("low", myMs<=10000);
  if(row.status==="playing" && (hostToMove?hostMs:guestMs) <= 0){   // 시간패 -> 상대 승
    const winner = hostToMove ? row.guest_id : row.host_id;
    sb.rpc("og_finish",{p_id:row.id,p_winner_id:winner,p_result:"timeout"});
  }
}

    desc:"⚪백 차례! <b>열린3을 두 개</b> 동시에 만드는 자리를 찾으세요.",
    tip:"백은 금수가 없어서 삼삼을 쓸 수 있어요. 열린3이 둘이면 상대는 하나밖에 못 막아요.",
    stones:[[7,5,2],[7,6,2],[5,7,2],[6,7,2],[2,2,1],[12,12,1],[3,11,1]] },
  { id:"L10", g:"이중위협", title:"상대의 사삼 막기", tag:"수비", type:"blockDouble", color:1, answer:[7,7],
    desc:"⚫흑 차례! 백이 다음 수에 <b>사삼</b>으로 이기려 해요. 그 급소를 먼저 차지하세요!",
    tip:"이중위협은 만들어지면 못 막아요. <b>만들어지기 전에</b> 급소를 미리 차지하는 게 최고의 수비예요.",
    stones:[[7,4,2],[7,5,2],[7,6,2],[5,7,2],[6,7,2],[7,3,1],[3,3,1],[11,4,1]] },

  // --- 정석 ---
  { id:"L11", g:"초반 정석", title:"정석 '화월' 두기", tag:"초반", type:"opening", color:1, target:"화월", white2:[6,7],
    answer:[6,8],
    desc:"⚫흑1은 천원, ⚪백2는 바로 위. 흑3을 <b>백돌의 대각선 옆</b>에 두면 정석 <b>화월(花月)</b>이 돼요. 그 자리에 두세요!",
    tip:"프로들은 첫 3수를 26가지로 정리해 이름을 붙였어요(렌주 26주형). 화월은 흑이 이기기 좋은 대표 정석이에요.",
    stones:[[7,7,1],[6,7,2]] },
];
function lessonProgress(){ try{ return JSON.parse(localStorage.getItem("omok_lessons")||"[]"); }catch(e){ return []; } }
function markLesson(id){ const p=lessonProgress(); if(!p.includes(id)){ p.push(id); localStorage.setItem("omok_lessons", JSON.stringify(p)); } }
function lessonBoard(L){ const b=Omok.createBoard(); L.stones.forEach(([r,c,col])=>b[r][c]=col); return b; }

// 이 문제의 정답 자리 전부를 엔진으로 계산한다 (대칭·별해도 자동 인정)
function lessonAnswers(L){
  const b = lessonBoard(L), col = L.color, opp = col===1?2:1, out = [];
  const K = window.OmokCoach;
  if(L.type==="double") return K.doubleThreatPoints(b,col).map(d=>d.at);
  if(L.type==="blockDouble") return K.doubleThreatPoints(b,opp).map(d=>d.at);
  if(L.type==="block") return K.winPoints(b,opp);
  for(let r=0;r<Omok.N;r++) for(let c=0;c<Omok.N;c++){
    if(b[r][c]!==Omok.EMPTY) continue;
    if(L.type==="opening"){
      const o = K.opening([[7,7], L.white2, [r,c]]);
      if(o && o.name===L.target) out.push([r,c]);
      continue;
    }
    const a = Omok.analyze(b,r,c,col);
    if(L.type==="win"){ if(a.win) out.push([r,c]); continue; }
    if(L.type==="forbidden"){ if(a.forbidden) out.push([r,c]); continue; }
    const m = K.moveInfo(b,r,c,col);
    if(!m.ok) continue;
    if(L.type==="openThree" && m.openThree>=1) out.push([r,c]);
    if(L.type==="openFour" && m.openFour>=1) out.push([r,c]);
  }
  return out;
}
// 틀렸을 때 왜 틀렸는지 알려준다
function lessonWhy(L,r,c){
  const b = lessonBoard(L), col = L.color;
  const a = Omok.analyze(b,r,c,col);
  if(a.forbidden && L.type!=="forbidden") return `그 자리는 <b>${a.forbidden}</b> 금수라 흑은 둘 수 없어요.`;
  const m = window.OmokCoach.moveInfo(b,r,c,col);
  if(L.type==="forbidden") return "그 자리는 둘 수 있는 자리예요. 열린3이 두 개 겹치는 곳을 찾아보세요.";
  if(L.type==="openThree") return m.openThree ? "" : "아직 열린3이 아니에요. 내 돌 두 개의 <b>양끝이 뚫리도록</b> 이어보세요.";
  if(L.type==="openFour") return (m.four&&!m.openFour) ? "4는 맞지만 한쪽이 막혀서 상대가 막을 수 있어요. <b>양쪽이 다 뚫린</b> 4를 만들어야 해요."
    : "아직 4가 아니에요. 내 돌 3개를 4개로 이어보세요.";
  if(L.type==="double") return m.openThree||m.four ? "위협이 하나뿐이라 상대가 막을 수 있어요. <b>두 개를 동시에</b> 만드는 자리를 찾아요." : "위협이 안 만들어졌어요. 내 돌이 두 방향으로 겹치는 자리를 봐요.";
  if(L.type==="blockDouble") return "그 자리는 급소가 아니에요. 상대 돌이 <b>두 방향으로 겹치는</b> 자리를 찾아 먼저 차지하세요.";
  if(L.type==="block") return "그 자리를 두면 상대가 그대로 5목을 완성해요. 상대 4의 <b>뚫린 끝</b>을 막아야 해요.";
  if(L.type==="opening") return "그 자리는 화월이 아니에요. 백돌의 <b>대각선 바로 옆</b>을 봐요.";
  return "다시 생각해 볼까요?";
}

function openCurriculum(){
  openModal("lessonBack");
  const done = lessonProgress();
  let html = "", grp = "";
  LESSONS.forEach((L,i)=>{
    if(L.g !== grp){ grp = L.g; html += `<div class="lsn-grp">${esc(grp)}</div>`; }
    const ok = done.includes(L.id);
    html += `<div class="feed-row" style="cursor:pointer" onclick="openLesson(${i})">
      <span>${ok?"✅":"⬜"}</span>
      <span class="vs">${esc(L.title)}<span class="lsn-tag">${esc(L.tag)}</span></span>
      <span style="color:var(--orange-deep);font-weight:800">▶</span></div>`;
  });
  document.getElementById("lessonBody").innerHTML = `
    <span class="close-x" onclick="closeModal('lessonBack')">✕</span>
    <h2>🎓 오목 배우기</h2>
    <div class="tg-note" style="margin:0 0 10px">기본기 → 모양 → 이중위협 → 정석 순서로 배워요! (${done.length}/${LESSONS.length} 완료)</div>
    ${html}`;
}
let curLesson = null;
function openLesson(i){
  const L = LESSONS[i];
  curLesson = { L, i, solved:false, answers: lessonAnswers(L), reveal:false };
  document.getElementById("lessonBody").innerHTML = `
    <span class="close-x" onclick="closeModal('lessonBack')">✕</span>
    <h2 style="font-size:17px">${esc(L.title)}<span class="lsn-tag">${esc(L.g)}</span></h2>
    <div class="replay-fb tip" id="lessonMsg" style="margin:0 0 10px">${L.desc}</div>
    <div class="board-wrap"><div id="lessonBoard"></div></div>
    <div class="game-btns" style="margin-top:12px">
      <button class="btn btn-ghost" onclick="openLesson(${i})">↺ 다시</button>
      <button class="btn btn-ghost" onclick="lessonReveal()">💡 정답 보기</button>
      <button class="btn btn-ghost" onclick="openCurriculum()">← 목록</button>
    </div>
    <div class="tg-note" style="margin-top:10px;text-align:left">💡 <b>배우기:</b> ${L.tip}</div>`;
  renderLessonBoard();
}
function renderLessonBoard(extra){
  const L = curLesson.L, b = lessonBoard(L), N = Omok.N;
  const marks = extra || {};
  let h = `<div class="rgrid romok" style="${omokGridStyle("min(88vmin,360px)")}">`;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    const v = (marks.at && marks.at[0]===r && marks.at[1]===c) ? L.color : b[r][c];
    let cls = (isStar(r,c) && !v) ? " star" : "";
    if(marks.at && marks.at[0]===r && marks.at[1]===c) cls += " rlast";
    else if(curLesson.reveal && !b[r][c] && curLesson.answers.some(p=>p[0]===r&&p[1]===c)) cls += " rhint";
    const inner = v ? `<span class="rstone ${v===1?'bk':'wt'}"></span>` : "";
    h += `<div class="rsq${cls}" onclick="lessonClick(${r},${c})">${inner}</div>`;
  }
  document.getElementById("lessonBoard").innerHTML = h + `</div>`;
}
function lessonReveal(){
  if(!curLesson) return;
  curLesson.reveal = true; renderLessonBoard();
  const msg = document.getElementById("lessonMsg");
  msg.className = "replay-fb miss";
  msg.innerHTML = `💡 초록 점선이 정답이에요 (${curLesson.answers.length}곳). 직접 눌러서 확인해 보세요!`;
}
function lessonClick(r,c){
  if(!curLesson || curLesson.solved) return;
  const L = curLesson.L, b = lessonBoard(L);
  const msg = document.getElementById("lessonMsg");
  if(b[r][c]!==Omok.EMPTY) return;
  const ok = curLesson.answers.some(p=>p[0]===r&&p[1]===c);
  if(ok){
    curLesson.solved = true; curLesson.reveal = false; markLesson(L.id);
    sfx.win(); confetti();
    renderLessonBoard({ at:[r,c] });
    const next = curLesson.i + 1 < LESSONS.length
      ? ` <button class="mini-btn" onclick="openLesson(${curLesson.i+1})">다음 문제 ▶</button>` : " 모든 단계를 끝냈어요! 🏆";
    msg.className = "replay-fb good";
    msg.innerHTML = `🎉 정답이에요! 잘했어요.${next}`;
  } else {
    msg.className = "replay-fb warn";
    msg.innerHTML = `❌ 아쉬워요. ${lessonWhy(L,r,c)}`;
  }
}

renderTierGuide();

loadStudents();
</script>
