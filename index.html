<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>우리 반 오목 랭킹</title>
<style>
  :root {
    --orange: #ff8a3d; --orange-deep: #ff6f1f; --yellow: #ffcf5c;
    --bg: #fff7ec; --card: #fff; --text: #3d2b1f; --sub: #9b8574;
    --shadow: 0 6px 18px rgba(255,138,61,0.15);
    --up: #ff5a5a; --down: #3f8cff;
    --board: #e9b96e; --line: #7a5230;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:80px; overflow-x:hidden; }
  header { background:linear-gradient(135deg,var(--orange),var(--yellow)); padding:20px 18px 16px; color:#fff;
    border-radius:0 0 24px 24px; box-shadow:var(--shadow); position:sticky; top:0; z-index:10; }
  header h1 { margin:0; font-size:21px; font-weight:800; letter-spacing:-0.5px; }
  header p { margin:3px 0 0; font-size:12.5px; opacity:0.92; }
  .wrap { max-width:520px; margin:0 auto; padding:14px 14px; }

  /* 탭 */
  .tabs { display:flex; gap:5px; max-width:520px; margin:12px auto 0; padding:0 10px; }
  .tab { flex:1; text-align:center; padding:10px 1px; border-radius:11px; font-weight:700; font-size:12.5px;
    background:#fff; color:var(--sub); box-shadow:var(--shadow); cursor:pointer; white-space:nowrap; }
  .tab.active { background:var(--orange-deep); color:#fff; }

  .card { background:var(--card); border-radius:18px; box-shadow:var(--shadow); padding:14px 16px;
    margin-bottom:12px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:transform .12s; }
  .card:active { transform:scale(0.98); }
  .rank-badge { width:34px; height:34px; flex:none; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-weight:800; font-size:15px; background:#f1e7db; color:var(--sub); }
  .rank-1 { background:linear-gradient(135deg,#ffd24d,#ffb300); color:#fff; }
  .rank-2 { background:linear-gradient(135deg,#d9dee6,#aab4c2); color:#fff; }
  .rank-3 { background:linear-gradient(135deg,#f0b98a,#d98b4f); color:#fff; }
  .info { flex:1; min-width:0; }
  .info .name { font-size:17px; font-weight:700; }
  .info .sub { font-size:12.5px; color:var(--sub); margin-top:3px; }
  .tier-pill { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:999px;
    font-size:12px; font-weight:700; color:#fff; }
  /* 티어 안내표 */
  .tier-guide { display:flex; align-items:center; justify-content:center; gap:2px; background:#fff;
    border-radius:16px; box-shadow:var(--shadow); padding:12px 8px; margin-bottom:8px; flex-wrap:wrap; }
  .tg-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 6px;
    border-bottom:3px solid; border-radius:4px; min-width:48px; }
  .tg-em { font-size:20px; } .tg-nm { font-size:11px; font-weight:800; }
  .tg-arrow { color:var(--sub); font-size:16px; font-weight:800; }
  .tg-note { text-align:center; font-size:12px; color:var(--sub); font-weight:600; margin:0 0 14px; }
  .lp-box { text-align:right; flex:none; }
  .lp-box .lp { font-size:18px; font-weight:800; color:var(--orange-deep); }
  .lp-box .lp small { font-size:11px; color:var(--sub); font-weight:600; }
  .lp-box .next-tier { font-size:10px; color:var(--sub); font-weight:700; margin-top:2px; white-space:nowrap; }
  .gauge { height:6px; background:#f1e7db; border-radius:999px; margin-top:6px; overflow:hidden; }
  .gauge>div { height:100%; background:linear-gradient(90deg,var(--orange),var(--yellow)); border-radius:999px; transition:width .6s; }

  .fab-bar { position:fixed; bottom:0; left:0; right:0; display:flex; gap:10px;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom)); max-width:520px; margin:0 auto;
    background:linear-gradient(to top,var(--bg) 70%,transparent); }
  .btn { flex:1; border:none; border-radius:14px; padding:15px 0; font-size:15px; font-weight:700; color:#fff;
    cursor:pointer; box-shadow:var(--shadow); }
  .btn-primary { background:linear-gradient(135deg,var(--orange-deep),var(--orange)); }
  .btn-ghost { background:#fff; color:var(--orange-deep); border:2px solid var(--orange); }
  .btn:disabled { opacity:.5; }

  .modal-back { position:fixed; inset:0; background:rgba(60,43,31,0.45); display:none; align-items:flex-end;
    justify-content:center; z-index:50; }
  .modal-back.open { display:flex; }
  .modal { background:#fff; width:100%; max-width:520px; border-radius:22px 22px 0 0; padding:22px 20px 28px;
    animation:slideUp .25s ease; max-height:88vh; overflow-y:auto; }
  @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
  .modal h2 { margin:0 0 16px; font-size:19px; }
  .modal label { display:block; font-size:13px; color:var(--sub); margin:12px 0 6px; font-weight:600; }
  .modal input, .modal select { width:100%; padding:13px 14px; font-size:15px; border:2px solid #f0e5d8;
    border-radius:12px; background:#fffdf9; -webkit-appearance:none; appearance:none; }
  .modal input:focus, .modal select:focus { outline:none; border-color:var(--orange); }
  .modal .row { display:flex; gap:10px; } .modal .row>div { flex:1; }
  .close-x { float:right; font-size:22px; color:var(--sub); cursor:pointer; line-height:1; }
  .empty { text-align:center; color:var(--sub); padding:40px 0; font-size:14px; }
  .hist-item { display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid #f4ece1; font-size:14px; }
  .hist-item:last-child { border-bottom:none; }
  .badge-r { flex:none; width:26px; height:26px; border-radius:8px; display:flex; align-items:center;
    justify-content:center; font-weight:800; font-size:12px; color:#fff; }
  .badge-w { background:var(--up); } .badge-l { background:var(--down); }

  .toast { position:fixed; top:84px; left:50%; transform:translateX(-50%) translateY(-20px); background:#fff;
    border-radius:16px; box-shadow:var(--shadow); padding:16px 20px; z-index:100; opacity:0; pointer-events:none;
    transition:opacity .3s,transform .3s; min-width:240px; max-width:90%; text-align:center; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .t-row { display:flex; justify-content:space-between; align-items:center; margin:6px 0; font-size:15px; gap:16px; }
  .lp-up { color:var(--up); font-weight:800; } .lp-down { color:var(--down); font-weight:800; }
  .pop { display:inline-block; animation:pop .5s ease; }
  @keyframes pop { 0%{transform:scale(1);} 40%{transform:scale(1.5);} 100%{transform:scale(1);} }
  .promo { font-size:13px; color:var(--orange-deep); font-weight:700; margin-top:6px; }

  /* 오목판 */
  #playView { display:none; }
  #gameArea { display:none; }
  #gameArea.active { display:block; }
  #chessArea { display:none; }
  #chessArea.active { display:block; }
  /* 게임 종류 선택 */
  .gtype { display:flex; gap:8px; margin-bottom:14px; }
  .gt { flex:1; padding:12px 0; border-radius:12px; border:2px solid #f0e5d8; background:#fffdf9; color:var(--sub);
    font-weight:800; font-size:15px; cursor:pointer; }
  .gt.active { background:var(--orange-deep); color:#fff; border-color:var(--orange-deep); }
  /* 체스판 */
  #chessBoard { display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr);
    width:min(90vmin,440px); aspect-ratio:1;
    border:5px solid #6b4423; border-radius:6px; box-shadow:var(--shadow); overflow:hidden; touch-action:manipulation; }
  .csq { display:flex; align-items:center; justify-content:center; font-size:min(8vmin,33px); line-height:1;
    cursor:pointer; user-select:none; position:relative; }
  .csq.light { background:#f0d9b5; } .csq.dark { background:#b58863; }
  .csq.sel { background:#f7ec6e !important; }
  .csq.legal::after { content:""; position:absolute; width:30%; height:30%; border-radius:50%; background:rgba(20,20,20,0.30); }
  .csq.legal.cap::after { width:86%; height:86%; border-radius:50%; background:transparent; border:4px solid rgba(20,20,20,0.30); }
  .csq.chk { background:#ff8f8f !important; }
  .cpiece { pointer-events:none; }
  .cw { color:#fdfdfd; text-shadow:0 0 2px #000, 0 1px 1px rgba(0,0,0,.7); }
  .cb { color:#1c1c1c; text-shadow:0 0 1px rgba(255,255,255,.4); }
  /* 장기판 */
  #janggiArea { display:none; }
  #janggiArea.active { display:block; }
  #janggiBoard { display:grid; grid-template-columns:repeat(9,1fr); grid-template-rows:repeat(10,1fr);
    width:min(94vmin,432px); aspect-ratio:9/10;
    background:#e6c179; border:4px solid #6b4423; border-radius:6px; overflow:hidden; touch-action:manipulation; }
  .jsq { position:relative; display:flex; align-items:center; justify-content:center;
    border:0.5px solid rgba(107,68,35,0.45); cursor:pointer; }
  .jsq.palace { background:rgba(150,95,40,0.16); }
  .jsq.sel { background:#f7ec6e !important; }
  .jpiece { width:80%; aspect-ratio:1; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:min(5.4vmin,23px); background:#f6e6bf; border:2px solid; box-shadow:0 1px 2px rgba(0,0,0,.3); }
  .jpiece.jr { color:#c0261b; border-color:#c0261b; }
  .jpiece.jb { color:#0a7d3a; border-color:#0a7d3a; }
  .jsq.legal::after { content:""; position:absolute; width:26%; height:26%; border-radius:50%; background:rgba(20,20,20,.32); }
  .jsq.legal.cap::after { width:82%; height:82%; background:transparent; border:3px solid rgba(20,20,20,.38); border-radius:50%; }
  /* 복기 보드 */
  .rgrid { display:grid; background:#e6c179; border:3px solid #6b4423; border-radius:5px; overflow:hidden; margin:0 auto; }
  .rgrid.rchess { font-size:min(6.5vmin,25px); }
  .rgrid.rjanggi .rdisk { font-size:min(4.2vmin,17px); }
  .rsq { position:relative; display:flex; align-items:center; justify-content:center;
    border:0.5px solid rgba(107,68,35,0.4); font-weight:900; }
  /* 오목판: 바둑판은 칸이 아니라 '선의 교차점'에 돌을 놓는다.
     칸 테두리 대신 칸 '가운데'로 선을 그어, 칸 중앙(=교차점)에 돌이 오게 한다. */
  .rgrid.romok { --ln:#7a5230; --st:#7a5230; }
  .rgrid.romok .rsq { border:0; background-repeat:no-repeat;
    background-image:linear-gradient(var(--ln),var(--ln)), linear-gradient(var(--ln),var(--ln));
    background-position:center center, center center;
    background-size:1px 100%, 100% 1px; }
  /* 가장자리 칸은 바깥으로 삐져나가는 반 칸을 잘라낸다 (맨 끝 선이 곧 맨 끝 교차점) */
  .rgrid.romok .rsq:nth-child(-n+15) { background-size:1px 50%, 100% 1px; background-position:center bottom, center center; }
  .rgrid.romok .rsq:nth-child(n+211) { background-size:1px 50%, 100% 1px; background-position:center top, center center; }
  .rgrid.romok .rsq:nth-child(15n+1) { background-size:1px 100%, 50% 1px; background-position:center center, right center; }
  .rgrid.romok .rsq:nth-child(15n)   { background-size:1px 100%, 50% 1px; background-position:center center, left center; }
  /* 네 귀퉁이 (위 규칙들보다 뒤에 와야 이김) */
  .rgrid.romok .rsq:nth-child(1)   { background-size:1px 50%, 50% 1px; background-position:center bottom, right center; }
  .rgrid.romok .rsq:nth-child(15)  { background-size:1px 50%, 50% 1px; background-position:center bottom, left center; }
  .rgrid.romok .rsq:nth-child(211) { background-size:1px 50%, 50% 1px; background-position:center top, right center; }
  .rgrid.romok .rsq:nth-child(225) { background-size:1px 50%, 50% 1px; background-position:center top, left center; }
  /* 화점(별) */
  .rgrid.romok .rsq.star::before { content:""; position:absolute; width:22%; height:22%;
    border-radius:50%; background:var(--st); }
  .rsq.light { background:#f0d9b5; } .rsq.dark { background:#b58863; }
  .rsq.palace { background:rgba(150,95,40,0.16); }
  .rsq.rlast { box-shadow:inset 0 0 0 3px #f7d84e; }
  .rsq.sel { background:#f7ec6e !important; }
  .rsq.chk { background:#ff8f8f !important; }
  .rsq.legal::after { content:""; position:absolute; width:30%; height:30%; border-radius:50%; background:rgba(20,20,20,0.30); }
  .rsq.legal.cap::after { width:86%; height:86%; background:transparent; border:4px solid rgba(20,20,20,0.30); border-radius:50%; }
  .rsq .rc { color:#fdfdfd; text-shadow:0 0 2px #000,0 1px 1px rgba(0,0,0,.7); }
  .rsq .rcb { color:#1c1c1c; text-shadow:0 0 1px rgba(255,255,255,.4); }
  .rdisk { width:84%; aspect-ratio:1; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:#f6e6bf; border:2px solid; box-shadow:0 1px 1px rgba(0,0,0,.3); }
  .rdisk.jr { color:#c0261b; border-color:#c0261b; } .rdisk.jb { color:#0a7d3a; border-color:#0a7d3a; }
  .rstone { width:76%; aspect-ratio:1; border-radius:50%; }
  .rstone.bk { background:radial-gradient(circle at 35% 32%,#555,#111); }
  .rstone.wt { background:radial-gradient(circle at 35% 32%,#fff,#cfd3d8); border:1px solid #ccc; }
  #replayCount { pointer-events:none; }
  .replay-fb { margin:10px 0 2px; padding:10px 12px; border-radius:12px; font-size:13.5px; font-weight:600;
    text-align:center; line-height:1.4; }
  .replay-fb.tip  { background:#f1f3f5; color:var(--sub); }
  .replay-fb.good { background:#e6f7ec; color:#137a3f; }
  .replay-fb.miss { background:#fff3d6; color:#8a6d1a; }
  .replay-fb.warn { background:#ffe6e6; color:#c0261b; }
  .replay-fb b { font-weight:900; }
  /* 코칭: 추천 자리(힌트)·위협 자리 표시 */
  .rsq.rhint::after { content:""; position:absolute; inset:14%; border-radius:50%;
    border:2.5px dashed #1f8f4e; background:rgba(31,143,78,0.16); animation:hintPulse 1.2s ease-in-out infinite; }
  .rsq.rmark::after { content:""; position:absolute; inset:22%; border-radius:50%; background:rgba(192,38,27,0.42); }
  @keyframes hintPulse { 0%,100%{opacity:.45} 50%{opacity:1} }
  .fb-head { display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:3px; font-size:12.5px; font-weight:900; }
  .fb-badge { padding:1px 8px; border-radius:999px; background:rgba(0,0,0,.07); }
  /* 복기 요약(대국 리포트) */
  .rep-sum { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin:8px 0 2px; }
  .rep-chip { font-size:11.5px; font-weight:800; padding:3px 9px; border-radius:999px; background:#f1f3f5; color:var(--sub); }
  .rep-chip.on { cursor:pointer; }
  .rep-chip.g-brilliant { background:#e6f7ec; color:#137a3f; }
  .rep-chip.g-mistake { background:#fff3d6; color:#8a6d1a; }
  .rep-chip.g-blunder { background:#ffe6e6; color:#c0261b; }
  /* 레슨 목록 */
  .lsn-grp { font-size:12px; font-weight:900; color:var(--orange-deep); margin:12px 0 4px; }
  .lsn-tag { font-size:10.5px; font-weight:800; padding:1px 7px; border-radius:999px; background:#f1f3f5; color:var(--sub); margin-left:5px; }
  /* 승격 선택창 */
  .promo-picker { position:fixed; inset:0; background:rgba(60,43,31,0.55); z-index:120;
    display:none; align-items:center; justify-content:center; flex-direction:column; }
  .promo-picker.show { display:flex; }
  .promo-title { color:#fff; font-weight:800; margin-bottom:14px; font-size:16px; }
  .promo-opts { display:flex; gap:10px; background:#fff; padding:16px; border-radius:18px; box-shadow:var(--shadow); }
  .promo-opts button { width:62px; height:80px; border:2px solid #f0e5d8; border-radius:12px; background:#fffdf9;
    font-size:36px; color:#1c1c1c; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .promo-opts button span { font-size:12px; font-weight:800; color:var(--sub); margin-top:2px; }
  .promo-opts button:active { background:#fff0dd; }
  /* 온라인 대국 */
  #onlineBody select, #onlineBody input { width:100%; padding:12px 14px; font-size:15px; border:2px solid #f0e5d8;
    border-radius:12px; background:#fffdf9; -webkit-appearance:none; appearance:none; margin-bottom:4px; }
  #onlineBody label { display:block; font-size:13px; color:var(--sub); margin:10px 0 6px; font-weight:600; }
  .online-players { display:flex; gap:10px; margin-bottom:12px; }
  .online-players .pl-card { flex:1; }
  #olBoard .rgrid { touch-action:manipulation; }
  .chat { max-height:120px; overflow-y:auto; background:#fff7ec; border-radius:12px; padding:8px 10px; margin-top:12px;
    font-size:13.5px; display:flex; flex-direction:column; gap:4px; }
  .chat:empty { display:none; }
  .chat-line { align-self:flex-start; background:#fff; border-radius:10px; padding:5px 9px; max-width:80%; box-shadow:0 1px 2px rgba(0,0,0,.06); }
  .chat-line.mine { align-self:flex-end; background:#ffe6cc; }
  .chat-line b { color:var(--orange-deep); font-size:11px; display:block; }
  .chat-presets { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .chat-presets button { border:1px solid #f0e5d8; background:#fffdf9; border-radius:999px; padding:5px 10px;
    font-size:12.5px; cursor:pointer; }
  .chat-input { display:flex; gap:6px; margin-top:8px; }
  .chat-input input { flex:1; padding:9px 12px; font-size:14px; border:2px solid #f0e5d8; border-radius:10px; background:#fffdf9; }
  .chat-input .mini-btn { margin-top:0; flex:none; width:auto; padding:9px 14px; }
  .rotate-hint { text-align:center; font-size:12.5px; color:#8a6d1a; background:#fff3d6;
    border:1px solid #ffdd8f; border-radius:10px; padding:7px 10px; margin:0 0 10px; }
  .players { display:flex; gap:10px; margin-bottom:12px; }
  .pl-card { flex:1; background:#fff; border-radius:14px; box-shadow:var(--shadow); padding:10px 12px; text-align:center;
    border:3px solid transparent; }
  .pl-card.turn { border-color:var(--orange); }
  .pl-card .stone { font-size:20px; } .pl-card .pn { font-weight:800; font-size:15px; margin-top:2px; }
  .clk { font-weight:800; font-size:17px; margin-top:3px; color:var(--sub); font-variant-numeric:tabular-nums; }
  .clk:empty { display:none; }
  /* AI 말풍선 — AI가 왜 그 수를 뒀는지 알려준다 (연습 모드) */
  .ai-say { display:none; text-align:center; font-weight:700; font-size:13px; color:#6c3fd0;
    background:#f4eeff; border:2px solid #e0d2ff; border-radius:12px; padding:7px 12px; margin:8px 0 0; }
  .ai-say.on { display:block; }
  .clk.run { color:var(--orange-deep); }
  .clk.low { color:#e03131; }
  .board-wrap { display:flex; justify-content:center; }
  #board { background:var(--board); border-radius:12px; box-shadow:var(--shadow); touch-action:manipulation; }
  .game-msg { text-align:center; font-weight:700; margin:12px 0 4px; min-height:22px; color:var(--orange-deep); }
  .game-btns { display:flex; gap:10px; margin-top:10px; }
  .game-btns .btn { padding:12px 0; font-size:14px; }
  .setup-note { font-size:12px; color:var(--sub); text-align:center; margin-top:8px; }

  /* 대국 가로모드 최적화 (태블릿): 판은 왼쪽 크게, 컨트롤은 오른쪽 세로 배치 */
  @media (orientation: landscape) {
    .rotate-hint { display:none; }
    #gameArea.active {
      display:grid;
      width:100vw; margin-left:50%; transform:translateX(-50%);   /* .wrap 520px 제약을 벗어나 전체 폭 사용 */
      padding:6px 20px 0;
      grid-template-columns:auto minmax(170px, 280px);
      grid-template-areas:
        "board players"
        "board say"
        "board msg"
        "board opts"
        "board btns"
        "board .";
      justify-content:center; align-items:start; gap:8px 24px;
    }
    #gameArea.active .board-wrap { grid-area:board; }
    #gameArea.active .ai-say    { grid-area:say; margin:0; }
    #gameArea.active .players   { grid-area:players; flex-direction:column; gap:8px; margin:0; }
    #gameArea.active .game-msg  { grid-area:msg; margin:4px 0; }
    #gameArea.active .opts      { grid-area:opts; flex-direction:column; gap:10px; margin:2px 0; }

const TIERS = ["브론즈","실버","골드","플래티넘","다이아몬드"];
const TIER_COLORS = { "브론즈":"#b07a4e","실버":"#9aa6b2","골드":"#e6a800","플래티넘":"#37b3a6","다이아몬드":"#5b8dff" };

};

let audioCtx = null;
function beep(freq, dur, type = "sine", vol = 0.15) {
  if (!settings.sound) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();

    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);

// ---------- Supabase 호출 래퍼 ----------
async function fetchStudents() {
  const { data, error } = await sb.from("students").select("*");
  if (error) throw error;
  const list = data.map(s => ({ ...s }));
  list.sort((a,b) => tIdx(b.tier)-tIdx(a.tier) || b.lp-a.lp || b.wins-a.wins);
  let rank = 0;
  list.forEach(s => {
    const g = s.wins + s.losses;
    s.games = g;
    s.win_rate = g ? Math.round(s.wins/g*1000)/10 : 0;
    s.rank = s.is_tester ? null : (++rank);   // 테스터는 랭킹에서 제외
  });
  return list;
}
function tIdx(t){ return TIERS.indexOf(t); }

async function addStudent(name, password) {
  const { error } = await sb.rpc("register_student", { p_name: name, p_password: password });
  if (error) throw new Error(error.message);
}
async function verifyStudent(id, password) {
  const { data, error } = await sb.rpc("verify_student", { p_id: id, p_password: password });
  if (error) throw new Error(error.message);
  return data === true;
}
async function adminLogin(pw) {
  const { data, error } = await sb.rpc("is_admin", { p_pw: pw });
  if (error) throw new Error(error.message);
  return data === true;
}
async function adminRpc(fn, params) {

}
async function recordMatch(winnerId, loserId) {
  const { data, error } = await sb.rpc("record_match", { p_winner_id: winnerId, p_loser_id: loserId });
  if (error) throw new Error(error.message);
  return data;
}
async function pairBlocked(aId, bId) {
  // a 또는 b가 낀 최근 2경기가 '모두 a-b 대결'이면 연속 2판 -> 3번째 금지.
  // (둘 중 누구든 다른 학생과 한 판 두면, 그 경기가 최근 2경기에 들어와 풀림)
  const { data } = await sb.from("match_history").select("winner_id,loser_id")
    .or(`winner_id.eq.${aId},loser_id.eq.${aId},winner_id.eq.${bId},loser_id.eq.${bId}`)
    .order("id", { ascending: false }).limit(2);
  if(!data || data.length < 2) return false;
  const isPair = m => (m.winner_id===aId && m.loser_id===bId) || (m.winner_id===bId && m.loser_id===aId);
  return data.every(isPair);
}

const GAME_ICON = { omok:"⚫", chess:"♟️", janggi:"🏯" };
const GAME_NAME = { omok:"오목", chess:"체스", janggi:"장기" };
const DOW = ["일","월","화","수","목","금","토"];
const two = (n) => String(n).padStart(2,"0");

// 오늘/어제 기준 날짜키 (로컬 시간)
function dayKey(d){ return `${d.getFullYear()}-${two(d.getMonth()+1)}-${two(d.getDate())}`; }
function dayLabel(d){
  const today = new Date(), y = new Date(today); y.setDate(y.getDate()-1);
  const base = `${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})`;
  if(dayKey(d)===dayKey(today)) return `오늘 · ${base}`;
  if(dayKey(d)===dayKey(y)) return `어제 · ${base}`;
  return base;
}
function hhmm(d){ return `${two(d.getHours())}:${two(d.getMinutes())}`; }
// 피드 한 줄용 시각: 오늘이면 시:분, 아니면 날짜 + 시:분
function whenText(d){
  const today = new Date();
  if(dayKey(d)===dayKey(today)) return hhmm(d);
  return `${d.getMonth()+1}/${d.getDate()} ${hhmm(d)}`;
}

function gameRowHTML(g, opts){
  const o = opts || {};
  const d = new Date(g.created_at);
  const icon = GAME_ICON[g.game_type] || "⚔️";
  const draw = g.result === "draw" || !g.winner_id;
  const wName = g.winner_id === g.p1_id ? g.p1_name : g.p2_name;
  const lName = g.winner_id === g.p1_id ? g.p2_name : g.p1_name;
  const who = draw
    ? `<span class="w">${esc(g.p1_name)}</span><span style="color:var(--sub)"> vs </span><span class="w">${esc(g.p2_name)}</span><span style="color:var(--sub)"> · 무승부</span>`
    : `<span class="w">${esc(wName)}</span><span style="color:var(--sub)"> 승 · </span><span class="l">${esc(lName)}</span>`;
  const chips = (g.ranked ? `<span class="fd-chip rank">🏆 랭킹전</span>` : `<span class="fd-chip friend">🤝 친선전</span>`)
    + (g.online ? `<span class="fd-chip on">🌐 온라인</span>` : "");
  const lp = (g.ranked && !draw && g.lp_change != null) ? `<span class="lp-up">+${g.lp_change}</span>` : "";
  return `<div class="feed-row">
    <span title="${esc(GAME_NAME[g.game_type]||"")}">${icon}</span>
    <span class="vs">${who}
      <span class="fd-meta">${chips}${esc(GAME_NAME[g.game_type]||g.game_type)}
        <span class="fd-time">${esc(o.full ? hhmm(d) : whenText(d))}</span></span></span>
    ${lp}</div>`;
}

function setGameFilter(kind, val){ allGames[kind] = val; renderAllGames(); }
function renderAllGames(){
  const { rows, gt, mode } = allGames;
  const list = rows.filter(g => (gt==="all" || g.game_type===gt)
    && (mode==="all" || (mode==="ranked" ? g.ranked : !g.ranked)));
  // 날짜별로 묶기 (rows는 최신순이라 순서 그대로 유지됨)
  const groups = [];
  for(const g of list){
    const d = new Date(g.created_at), k = dayKey(d);
    if(!groups.length || groups[groups.length-1].k !== k) groups.push({ k, d, items:[] });
    groups[groups.length-1].items.push(g);
  }
  const fBtn = (kind, val, label) =>
    `<button class="fd-f${allGames[kind]===val?" on":""}" onclick="setGameFilter('${kind}','${val}')">${label}</button>`;
  const body = groups.length
    ? groups.map(gr => `<div class="day-head">${dayLabel(gr.d)} · ${gr.items.length}경기</div>`
        + gr.items.map(g => gameRowHTML(g, { full:true })).join("")).join("")
    : `<div class="empty">해당하는 경기가 없어요.</div>`;
  document.getElementById("feedBody").innerHTML = `

    </div>

    </div>
    <div class="tg-note" style="margin:0 0 4px">${list.length}경기 · 최근 500경기까지 보여줘요</div>
    ${body}`;
}

let realtimeReady = false, realtimeTimer = null, feedTimer = null;
function setupRealtime() {
  if (realtimeReady || !sb) return;
  realtimeReady = true;
  const refresh = () => {
    clearTimeout(realtimeTimer);
    realtimeTimer = setTimeout(() => { loadStudents(); }, 400); // 짧게 디바운스
  };
  sb.channel("omok-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "students" }, refresh)
    .on("postgres_changes", { event: "*", schema: "public", table: "match_history" }, refresh)
    // 친선전·온라인 경기는 students/match_history를 건드리지 않으므로 따로 구독해야 피드가 갱신된다
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "game_records" }, () => {
      clearTimeout(feedTimer);
      feedTimer = setTimeout(() => { loadFeed(); }, 400);
    })
    .subscribe();
}

async function submitManualMatch() {

  try {

function showResultToast(r) {
  const w=r.winner, l=r.loser; let extra="";
  if(w.promoted) extra += `<div class="promo">🎉 ${esc(w.name)} 승급! → ${w.new_tier}</div>`;
  if(l.demoted)  extra += `<div class="promo" style="color:var(--down)">⬇️ ${esc(l.name)} 강등… → ${l.new_tier}</div>`;
  if(w.streak>=3) extra += `<div class="promo" style="color:#e8590c">🔥 ${esc(w.name)} ${w.streak}연승 중!</div>`;
  const t = document.getElementById("toast");
  const wp = w.points_gain ? ` <span style="color:#e0a800">+${w.points_gain}P</span>` : "";
  const lp2 = l.points_gain ? ` <span style="color:#e0a800">+${l.points_gain}P</span>` : "";
  t.innerHTML = `<div style="font-weight:800;margin-bottom:8px;">대국 결과</div>
    <div class="t-row"><span>🥇 ${esc(w.name)}</span><span><span class="lp-up pop">+${w.lp_change} LP</span>${wp}</span></div>
    <div class="t-row"><span>🥈 ${esc(l.name)}</span><span><span class="lp-down pop">${l.lp_change} LP</span>${lp2}</span></div>${extra}`;
  t.classList.add("show");
  if(w.promoted) confetti();   // 승급은 (직접 입력이든 대국이든) 축하
  clearTimeout(window._tt); window._tt = setTimeout(()=>t.classList.remove("show"), 3400);
}

// ==================== 상점 ====================
let SHOP = {}, shopLoaded = false;
const DEFAULT_BOARD = { bg:"#e9b96e", line:"#7a5230", star:"#7a5230" };
// 체스·장기 기본 스킨 (스킨 미장착 시 사용)
const DEFAULT_CHESSBOARD  = { light:"#f0d9b5", dark:"#b58863", border:"#6b4423" };
const DEFAULT_JANGGIBOARD = { bg:"#e6c179", line:"rgba(107,68,35,0.45)", palace:"rgba(150,95,40,0.16)", border:"#6b4423" };
const DEFAULT_CPIECE = { w:{ fill:"#fdfdfd" }, b:{ fill:"#1c1c1c" } };            // 체스 기물: 백/흑 기본색
const DEFAULT_JPIECE = { r:{ disk:"#f6e6bf", text:"#c0261b", border:"#c0261b" },  // 장기 기물: 한(빨강)/초(초록)
                         b:{ disk:"#f6e6bf", text:"#0a7d3a", border:"#0a7d3a" } };
// 학생이 장착한 스킨 data 조회 (kind = chessboard / chesspiece / janggiboard / janggipiece …)
function equipData(s, kind){ const id = s && s["equip_"+kind]; return (id && SHOP[id] && SHOP[id].data) || null; }
function resolveChessBoard(white, black){
  return equipData(white,"chessboard") || equipData(black,"chessboard") || DEFAULT_CHESSBOARD;
}
function resolveChessPiece(player, side){                                   // side: 'w' | 'b'
  const d = equipData(player,"chesspiece");
  return (d && d.fill) ? d : DEFAULT_CPIECE[side];
}
function resolveJanggiBoard(red, blue){
  return equipData(red,"janggiboard") || equipData(blue,"janggiboard") || DEFAULT_JANGGIBOARD;
}
function resolveJanggiPiece(player, side){                                  // side: 'r' | 'b'
  const d = equipData(player,"janggipiece");
  return (d && (d.text || d.disk)) ? { ...DEFAULT_JPIECE[side], ...d } : DEFAULT_JPIECE[side];
}

async function loadShopCatalog() {
  if (shopLoaded || !sb) return;
  const { data, error } = await sb.from("shop_items").select("*").order("sort");
  if (error) return;

}

function stonePrevStyle(data, side) {
  let d = data;
  if (data.black || data.white) d = side === "white" ? data.white : data.black;
  const glow = d.glow ? `,0 0 9px ${d.glow}` : "";
  return `background:radial-gradient(circle at 35% 32%, ${d.in}, ${d.out});box-shadow:inset -3px -3px 6px rgba(0,0,0,0.25)${glow};`;
}
const DEFAULT_ITEM_IDS = new Set(["board_wood","stone_ink","cboard_wood","cpiece_std","jboard_wood","jpiece_std","vic_confetti"]);
function isDefaultItem(it) { return DEFAULT_ITEM_IDS.has(it.id); }
// 상점 카드 미리보기 (종류별)
function shopPreview(it){
  const d = it.data;
  if (it.kind === "board")
    return `<div class="prev" style="background:${d.bg};color:${d.line}"><div class="prev-line"></div></div>`;
  if (it.kind === "stone")
    return `<div class="prev" style="background:#efe2cf">
      <div class="prev-stone" style="${stonePrevStyle(d,'black')}"></div>
      <div class="prev-stone" style="${stonePrevStyle(d,'white')}"></div></div>`;
  if (it.kind === "chessboard") {
    const b = { ...DEFAULT_CHESSBOARD, ...d };
    return `<div class="prev" style="padding:0;overflow:hidden;border:2px solid ${b.border}">
      <div style="display:grid;grid-template-columns:1fr 1fr;width:100%;height:100%">
        <div style="background:${b.light}"></div><div style="background:${b.dark}"></div>
        <div style="background:${b.dark}"></div><div style="background:${b.light}"></div></div></div>`;
  }
  if (it.kind === "janggiboard") {
    const b = { ...DEFAULT_JANGGIBOARD, ...d };
    return `<div class="prev" style="background:${b.bg};border:2px solid ${b.border};position:relative">
      <div style="position:absolute;inset:26% 30%;background:${b.palace};border:1px solid ${b.line}"></div></div>`;
  }
  if (it.kind === "chesspiece") {
    if (d.fill) { const g = d.glow ? `;text-shadow:0 0 6px ${d.glow},0 0 2px ${d.glow}` : "";
      return `<div class="prev" style="background:#c9a06a;font-size:26px;color:${d.fill}${g}">♛</div>`; }
    return `<div class="prev" style="background:#c9a06a;font-size:22px;gap:2px">
      <span style="color:#fdfdfd;text-shadow:0 0 2px #000">♚</span>
      <span style="color:#1c1c1c">♚</span></div>`;
  }
  if (it.kind === "janggipiece") {
    const r = { ...DEFAULT_JPIECE.r, ...d };
    const g = r.glow ? `,0 0 7px ${r.glow}` : "";
    return `<div class="prev" style="background:#e6c179">
      <div style="width:60%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;
        font-weight:900;font-size:17px;background:${r.disk};color:${r.text};border:2px solid ${r.border};
        box-shadow:0 1px 2px rgba(0,0,0,.3)${g}">車</div></div>`;
  }
  if (it.kind === "victory") {
    const bg = d.prevBg || "radial-gradient(circle at 50% 40%,#3a4670,#141a33)";
    const tap = `onclick="previewVictory('${it.id}')" title="눌러서 미리보기"`;
    let inner;
    if (d.type === "emoji")
      inner = `<div style="font-size:24px;letter-spacing:3px">${(d.emojis||["🎉"]).slice(0,3).join("")}</div>`;
    else if (d.type === "fireworks")
      inner = `<div style="font-size:30px">${d.rainbow ? "🌈🎆" : "🎆"}</div>`;
    else
      inner = `<div style="display:flex;gap:5px">` +
        ((d.colors)||["#ff8a3d","#ffcf5c","#ff5a5a","#5b8dff","#5cb85c"]).slice(0,5)
          .map(c=>`<span style="width:9px;height:13px;border-radius:2px;background:${c};display:inline-block;transform:rotate(18deg)"></span>`).join("") + `</div>`;
    return `<div class="prev vic-prev" style="background:${bg}" ${tap}>${inner}<span class="vic-play">▶ 미리보기</span></div>`;
  }
  return `<div class="prev"></div>`;
}

      <label style="display:block;font-size:13px;color:var(--sub);margin:10px 0 6px;font-weight:600">비밀번호</label>
      <input id="shopPw" type="password" placeholder="내 비밀번호" style="width:100%;padding:12px 14px;font-size:15px;border:2px solid #f0e5d8;border-radius:12px;background:#fffdf9" onkeydown="if(event.key==='Enter')shopLogin()">

  head.style.display = "flex";

  const owned = new Set(s.owned || []);
  const items = Object.values(SHOP).sort((a, b) => a.sort - b.sort);
  // 종목별 탭 (스크롤 대신 오목/체스/장기 전환)
  if (!SHOP_CATS[shopCat]) shopCat = "omok";
  const tabBar = `<div class="gtype shop-cat">` +
    Object.keys(SHOP_CATS).map(c =>
      `<button class="gt ${shopCat===c?'active':''}" onclick="setShopCat('${c}')">${SHOP_CATS[c].label}</button>`).join("") +
    `</div>`;
  const secs = SHOP_CATS[shopCat].secs
    .map(([title, kind]) => shopSection(title, items.filter(i => i.kind === kind), s, owned)).join("");
  body.innerHTML = attendHtml(s) + tabBar + secs;
}
// 상점 종목 탭 정의

  omok:   { label:"⚫ 오목", secs:[["🎋 바둑판","board"], ["⚫ 바둑알","stone"]] },

function attendHtml(s){
  const today = new Date(Date.now() + 9*3600*1000).toISOString().slice(0,10);   // KST 날짜

async function doAttend(){
  if(!onlineMe) return;
  try {
    const { data, error } = await sb.rpc("attend",{p_id:onlineMe.id});

function shopSection(title, items, s, owned) {
  if (!items.length) return "";
  return `<div class="shop-sec-title">${title}</div><div class="shop-grid">` +
    items.map(it => shopCard(it, s, owned)).join("") + `</div>`;
}
function shopCard(it, s, owned) {
  const free = it.price === 0;
  const has = free || owned.has(it.id);
  const equipField = s["equip_" + it.kind];
  const equipped = equipField === it.id || (free && isDefaultItem(it) && !equipField);
  const prev = shopPreview(it);
  let btn;
  if (equipped) btn = `<button class="shop-btn on" disabled>✓ 장착 중</button>`;
  else if (has) btn = `<button class="shop-btn equip" onclick="equipItem(${s.id},'${it.id}')">장착하기</button>`;
  else {
    const can = (s.points || 0) >= it.price;
    btn = `<button class="shop-btn buy" ${can ? "" : "disabled"} onclick="buyItem(${s.id},'${it.id}')">💰 ${it.price}P ${can ? "구매" : "부족"}</button>`;
  }
  return `<div class="shop-item ${equipped ? 'equipped' : ''}">
    ${has && !free ? '<span class="owned-tag">보유</span>' : ''}
    ${prev}
    <div class="iname">${esc(it.name)}</div>
    <div class="iprice">${free ? '기본 제공' : it.price + ' P'}</div>
    ${btn}</div>`;
}

// 게임에 적용할 스킨 해석
function resolveStone(equipId, side) {
  const it = SHOP[equipId];
  if (it && it.data) {
    if (it.data.black || it.data.white) return side === "white" ? it.data.white : it.data.black;
    return it.data;
  }
  return side === "white" ? { in:"#fff", out:"#cfd3d8" } : { in:"#555", out:"#111" };
}
function hasCustomBoard(s){
  return !!(s && s.equip_board && s.equip_board !== "board_wood" && SHOP[s.equip_board]);
}
function resolveGameSkins(black, white, boardOwner) {
  let board;
  if(boardOwner && SHOP[boardOwner.equip_board]) board = SHOP[boardOwner.equip_board].data;   // 선택된 학생 판
  else board = (SHOP[black.equip_board] && SHOP[black.equip_board].data)
             || (SHOP[white.equip_board] && SHOP[white.equip_board].data) || DEFAULT_BOARD;
  const stone = {};
  stone[Omok.BLACK] = resolveStone(black.equip_stone, "black");
  stone[Omok.WHITE] = resolveStone(white.equip_stone, "white");
  return { board, stone };
}

// ==================== 컨페티 ====================
function confetti() {
  const cv = document.getElementById("confetti"), cx = cv.getContext("2d");
  cv.style.display = "block"; cv.width = innerWidth; cv.height = innerHeight;
  const colors = ["#ff8a3d","#ffcf5c","#ff5a5a","#5b8dff","#5cb85c","#c9a0ff"];
  const parts = Array.from({ length: 130 }, () => ({
    x: innerWidth/2 + (Math.random()*2-1)*60, y: innerHeight*0.28,
    vx: (Math.random()*2-1)*6, vy: Math.random()*-9-3, g: 0.24,
    s: Math.random()*6+4, c: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*6, vr: (Math.random()*2-1)*0.3,
  }));
  let f = 0;
  (function tick() {
    cx.clearRect(0,0,cv.width,cv.height); f++;
    parts.forEach(p => {
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
      cx.fillStyle = p.c; cx.fillRect(-p.s/2, -p.s/2, p.s, p.s*0.6); cx.restore();
    });
    if (f < 170) requestAnimationFrame(tick);
    else { cx.clearRect(0,0,cv.width,cv.height); cv.style.display = "none"; }
  })();
}

// ==================== 승리 애니메이션 스킨 ====================
// 승자가 장착한 '승리 연출' 스킨을 재생한다. 없으면 기본 컨페티.
function playVictory(student){

  if(data) runVictoryFx(data); else confetti();

function previewVictory(id){ const it = SHOP[id]; if(it && it.data) runVictoryFx(it.data); }

let vfxRAF = 0;
function vfxSetup(){
  const cv = document.getElementById("confetti"), cx = cv.getContext("2d");
  cancelAnimationFrame(vfxRAF);
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.style.display = "block";
  cv.width = innerWidth*dpr; cv.height = innerHeight*dpr;
  cv.style.width = innerWidth+"px"; cv.style.height = innerHeight+"px";
  cx.setTransform(dpr,0,0,dpr,0,0);
  return { cx, W: innerWidth, H: innerHeight };
}
function vfxEnd(cx, W, H){
  cx.globalCompositeOperation = "source-over"; cx.globalAlpha = 1;
  cx.clearRect(0,0,W,H);
  document.getElementById("confetti").style.display = "none";
}
function runVictoryFx(d){
  const t = (d && d.type) || "confetti";
  if(t === "emoji")     return emojiFx(d);
  if(t === "fireworks") return fireworksFx(d);
  return confettiFx(d);
}
// 색종이 (색상 지정 가능)
function confettiFx(d){
  const { cx, W, H } = vfxSetup();
  const colors = (d && d.colors) || ["#ff8a3d","#ffcf5c","#ff5a5a","#5b8dff","#5cb85c","#c9a0ff"];
  const parts = Array.from({ length: 150 }, () => ({
    x: W/2 + (Math.random()*2-1)*80, y: H*0.28,
    vx: (Math.random()*2-1)*7, vy: Math.random()*-10-3, g: 0.24,
    s: Math.random()*7+4, c: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*6, vr: (Math.random()*2-1)*0.3,
  }));
  let f = 0;
  (function tick(){
    cx.clearRect(0,0,W,H); f++;
    parts.forEach(p => { p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
      cx.fillStyle = p.c; cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); cx.restore(); });
    if(f < 180) vfxRAF = requestAnimationFrame(tick); else vfxEnd(cx,W,H);
  })();
}
// 이모지 샤워 (motion: fall 위→아래 / rise 아래→위 / burst 가운데서 터짐)
function emojiFx(d){
  const { cx, W, H } = vfxSetup();
  const set = (d && d.emojis && d.emojis.length) ? d.emojis : ["🎉"];
  const motion = (d && d.motion) || "fall";
  const N = 44;
  const parts = Array.from({ length: N }, (_, i) => {
    const e = set[i % set.length], sz = Math.random()*20+24;
    if(motion === "rise")
      return { e, x: Math.random()*W, y: H + Math.random()*H*0.6, vy: -(Math.random()*1.6+1.3),
               vx: (Math.random()*2-1)*0.5, sz, ph: Math.random()*6, sp: Math.random()*0.05+0.02 };
    if(motion === "burst"){ const a = Math.random()*Math.PI*2, sp = Math.random()*7.5+3;
      return { e, x: W/2, y: H*0.42, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2.5, g: 0.16, sz }; }
    return { e, x: Math.random()*W, y: -Math.random()*H*0.6 - 20, vy: Math.random()*1.9+1.5,
             vx: (Math.random()*2-1)*0.5, sz, ph: Math.random()*6, sp: Math.random()*0.05+0.02 };
  });
  cx.textAlign = "center"; cx.textBaseline = "middle";
  let f = 0;
  (function tick(){
    cx.clearRect(0,0,W,H); f++;
    parts.forEach(p => {
      if(motion === "burst"){ p.vy += p.g; p.x += p.vx; p.y += p.vy; }
      else { p.y += p.vy; p.ph += p.sp; p.x += p.vx + Math.sin(p.ph)*0.9; }
      cx.font = p.sz + "px serif"; cx.fillText(p.e, p.x, p.y);
    });
    if(f < 205) vfxRAF = requestAnimationFrame(tick); else vfxEnd(cx,W,H);
  })();
}
// 불꽃놀이 (여러 발이 순차로 터진다. rainbow: 무지개색)
function fireworksFx(d){
  const { cx, W, H } = vfxSetup();
  const rainbow = !!(d && d.rainbow);
  const palette = (d && d.colors) || ["#ff5a5a","#ffcf5c","#5b8dff","#5cb85c","#c9a0ff","#ff8a3d"];
  const launches = Array.from({ length: 7 }, (_, i) => ({
    t: i*20 + 6, x: W*(0.18 + Math.random()*0.64), y: H*(0.18 + Math.random()*0.36),
    hue: Math.random()*360 }));
  let parts = [], f = 0;
  function burst(x, y, hue){
    const n = 44;
    for(let i=0;i<n;i++){ const a = (i/n)*Math.PI*2, sp = Math.random()*3+2.4;
      parts.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, g: 0.05, life: 1,
        dec: Math.random()*0.012+0.012,
        c: rainbow ? `hsl(${(hue + Math.random()*40)|0},100%,${(56+Math.random()*14)|0}%)`
                   : palette[Math.floor(Math.random()*palette.length)] }); }
  }
  (function tick(){
    cx.globalCompositeOperation = "source-over"; cx.clearRect(0,0,W,H); f++;
    launches.forEach(L => { if(L.t === f) burst(L.x, L.y, L.hue); });
    cx.globalCompositeOperation = "lighter";
    parts.forEach(p => { p.vy += p.g; p.x += p.vx; p.y += p.vy; p.vx *= 0.99; p.vy *= 0.99; p.life -= p.dec;
      if(p.life > 0){ cx.globalAlpha = Math.max(0, p.life); cx.fillStyle = p.c;
        cx.beginPath(); cx.arc(p.x, p.y, 2.6, 0, 7); cx.fill(); } });
    cx.globalAlpha = 1;
    parts = parts.filter(p => p.life > 0);
    if(f < 205) vfxRAF = requestAnimationFrame(tick); else vfxEnd(cx,W,H);
  })();
}

let game = null;

function sizeBoard() {
  const landscape = window.innerWidth > window.innerHeight;
  const header = document.querySelector("header");
  const tabs = document.querySelector(".tabs");
  const chromeTop = (header ? header.offsetHeight : 90) + (tabs ? tabs.offsetHeight : 48);
  let availW, availH;
  if (landscape) {
    // 판은 왼쪽, 오른쪽 컨트롤 패널(~280) + 여백을 뺀 폭 / 화면 높이에서 헤더·탭 제외
    availW = window.innerWidth - 300 - 60;
    availH = window.innerHeight - chromeTop - 24;
  } else {
    availW = Math.min(document.querySelector(".wrap").clientWidth, 460);
    // 위(플레이어 카드·안내)와 아래(옵션·메시지·버튼) 영역을 대략 제외
    availH = window.innerHeight - chromeTop - 250;
  }
  const size = Math.max(220, Math.min(availW, availH));
  CELL = Math.floor((size - PAD*2) / (Omok.N - 1));
  BSIZE = CELL*(Omok.N-1) + PAD*2;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = BSIZE*dpr; canvas.height = BSIZE*dpr;
  canvas.style.width = BSIZE+"px"; canvas.style.height = BSIZE+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

async function startGame() {
  if(needConfig()) return;
  if(students.length < 2){ alert("학생이 2명 이상 필요해요. (랭킹 탭에서 등록)"); return; }
  const bId = +document.getElementById("blackSel").value;
  const wId = +document.getElementById("whiteSel").value;
  if(bId === wId){ alert("흑돌과 백돌은 다른 학생이어야 해요."); return; }
  const blackS = students.find(s=>s.id===bId), whiteS = students.find(s=>s.id===wId);
  const testerInvolved = blackS.is_tester || whiteS.is_tester;
  gameRanked = matchMode === "ranked" && !testerInvolved;   // 테스터 끼면 무조건 친선(랭킹 미반영)
  gameTesterFriendly = matchMode === "ranked" && testerInvolved;   // 랭킹전을 골랐지만 테스터 때문에 친선이 된 경우
  if(gameRanked && await pairBlocked(bId, wId)){ alert("같은 친구와는 연속 2판까지예요! 다른 친구와 한 판 두고 오세요. 🔄"); return; }
  const bPw = document.getElementById("blackPw").value;
  const wPw = document.getElementById("whitePw").value;
  if(!bPw || !wPw){ alert("두 학생 모두 비밀번호를 입력해야 합니다."); return; }
  const black = students.find(s=>s.id===bId), white = students.find(s=>s.id===wId);
  const btn = document.getElementById("startBtn"); btn.disabled = true; btn.textContent = "확인 중…";
  try {
    const [bOk, wOk] = await Promise.all([verifyStudent(bId, bPw), verifyStudent(wId, wPw)]);
    if(!bOk && !wOk) throw new Error("두 학생의 비밀번호가 모두 틀립니다.");
    if(!bOk) throw new Error(`⚫ ${black.name} 님의 비밀번호가 틀립니다.`);
    if(!wOk) throw new Error(`⚪ ${white.name} 님의 비밀번호가 틀립니다.`);
    document.getElementById("blackPw").value = ""; document.getElementById("whitePw").value = "";
    if(gameType === "chess") beginChess(white, black);       // 체스: white 슬롯=백(선공)
    else if(gameType === "janggi") beginJanggi(white, black); // 장기: white 슬롯=한(아래·선공)
    else {
      let owner = null;   // 둘 다 커스텀 바둑판이 있으면 누구 판으로 둘지 선택
      if(hasCustomBoard(black) && hasCustomBoard(white))
        owner = confirm(`두 학생 모두 바둑판 스킨이 있어요! 누구 판으로 둘까요?\n\n[확인] ⚫ ${black.name} 님 판\n[취소] ⚪ ${white.name} 님 판`) ? black : white;
      beginGame(black, white, owner);
    }
  } catch(e){ alert(e.message); }
  finally { btn.disabled = false; btn.textContent = "🔒 확인하고 대국 시작!"; }
}

function beginGame(black, white, boardOwner, ai) {
  game = { board: Omok.createBoard(), turn: Omok.BLACK, over: false, history: [], black, white,
           boardOwner, ranked: ai ? false : gameRanked, ai: ai || null,
           skins: resolveGameSkins(black, white, boardOwner) };
  document.getElementById("gameSetup").style.display = "none";
  document.getElementById("gameArea").classList.add("active");
  document.getElementById("pnBlack").textContent = black.name;
  document.getElementById("pnWhite").textContent = white.name;
  document.getElementById("replayBtn").style.display = "none";
  document.getElementById("optForbidden").checked = settings.forbidden;
  document.getElementById("optSound").checked = settings.sound;
  sizeBoard(); draw(); updateTurnUI();
  document.getElementById("gameMsg").textContent = "";
  aiSay("");
  if(ai){   // 연습 대국은 시계를 쓰지 않는다 (AI가 생각하는 시간까지 재게 되니 의미가 없다)
    clockStop();
    [ "clkBlack", "clkWhite" ].forEach(id => document.getElementById(id).textContent = "");
    if(game.turn === ai.color) scheduleAI();
    return;
  }
  clockStart([Omok.BLACK, Omok.WHITE], Omok.BLACK, { [Omok.BLACK]:"clkBlack", [Omok.WHITE]:"clkWhite" },
    (loser) => { quickToast(`⏱️ ${(loser===Omok.BLACK?game.black:game.white).name} 님 시간 초과!`);
                 endGame(loser===Omok.BLACK?Omok.WHITE:Omok.BLACK); });
}

function updateTurnUI() {

function draw() {
  const skin = (game && game.skins && game.skins.board) || DEFAULT_BOARD;
  canvas.style.background = skin.bg;
  ctx.clearRect(0,0,BSIZE,BSIZE);
  ctx.strokeStyle = skin.line; ctx.lineWidth = 1;
  for(let i=0;i<Omok.N;i++){
    const p = PAD + i*CELL;
    ctx.beginPath(); ctx.moveTo(PAD,p); ctx.lineTo(BSIZE-PAD,p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p,PAD); ctx.lineTo(p,BSIZE-PAD); ctx.stroke();
  }
  // 화점
  ctx.fillStyle = skin.star || skin.line;
  [[3,3],[3,11],[11,3],[11,11],[7,7]].forEach(([r,c])=>{
    ctx.beginPath(); ctx.arc(PAD+c*CELL, PAD+r*CELL, 3, 0, 7); ctx.fill();
  });
  // 돌
  for(let r=0;r<Omok.N;r++) for(let c=0;c<Omok.N;c++){
    if(game.board[r][c]) drawStone(r,c,game.board[r][c], false);
  }
  // 마지막 수 표시
  const last = game.history[game.history.length-1];
  if(last){ drawStone(last.r,last.c,game.board[last.r][last.c], true); }
  // 금수 자리 미리보기 (흑 차례에만)
  if(settings.forbidden && !game.over && game.turn===Omok.BLACK){
    ctx.strokeStyle = "#e03131"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
    const d = CELL*0.22;
    for(const [r,c] of Omok.forbiddenPoints(game.board)){
      const x = PAD+c*CELL, y = PAD+r*CELL;
      ctx.beginPath(); ctx.moveTo(x-d,y-d); ctx.lineTo(x+d,y+d);
      ctx.moveTo(x+d,y-d); ctx.lineTo(x-d,y+d); ctx.stroke();
    }
    ctx.lineWidth = 1; ctx.lineCap = "butt";
  }
}
function drawStone(r,c,color,mark){
  const x = PAD+c*CELL, y = PAD+r*CELL, rad = CELL*0.42;
  const st = (game && game.skins && game.skins.stone[color])
          || (color===Omok.BLACK ? {in:"#555",out:"#111"} : {in:"#fff",out:"#cfd3d8"});
  if(st.glow){ ctx.save(); ctx.shadowColor = st.glow; ctx.shadowBlur = CELL*0.35; }
  ctx.beginPath(); ctx.arc(x,y,rad,0,7);
  const g = ctx.createRadialGradient(x-rad*0.3,y-rad*0.3,rad*0.1,x,y,rad);
  g.addColorStop(0, st.in); g.addColorStop(1, st.out);
  ctx.fillStyle = g; ctx.fill();
  if(st.glow) ctx.restore();
  ctx.strokeStyle = "rgba(0,0,0,0.25)"; ctx.lineWidth = 1; ctx.stroke();
  if(mark){ ctx.beginPath(); ctx.arc(x,y,rad*0.28,0,7);
    ctx.fillStyle = color===Omok.BLACK ? "#fff" : "#ff6f1f"; ctx.fill(); }
}
function getCSS(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

canvas.addEventListener("click", (e) => {
  if(!game || game.over) return;
  if(game.ai && (game.ai.thinking || game.turn === game.ai.color)) return;   // AI 차례엔 사람이 못 둔다
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const c = Math.round((x-PAD)/CELL), r = Math.round((y-PAD)/CELL);
  if(r<0||r>=Omok.N||c<0||c>=Omok.N) return;
  tryMove(r,c);
});

function tryMove(r,c) {
  if(game.board[r][c] !== Omok.EMPTY) return;
  const color = game.turn;
  const res = Omok.analyze(game.board, r, c, color);
  if(color===Omok.BLACK && res.forbidden){
    sfx.deny();
    flashMsg(`❌ 금수: ${res.forbidden} — 다른 곳에 두세요`);
    return;
  }
  game.board[r][c] = color;
  game.history.push({r,c});
  sfx.place();
  if(res.win){ endGame(color); return; }        // endGame/endDraw 가 draw() 수행
  if(Omok.isFull(game.board)){ endDraw(); return; }
  game.turn = color===Omok.BLACK ? Omok.WHITE : Omok.BLACK;
  draw();   // 턴을 넘긴 뒤 그려야 금수 표시(흑 전용)가 백 차례에 남지 않음
  updateTurnUI();
  clockSwitch(game.turn);
  if(game.ai && game.turn === game.ai.color) scheduleAI();
}

function undoMove() {
  if(!game || game.over || !game.history.length) return;
  if(game.ai){
    if(game.ai.thinking) return;
    clearTimeout(aiTimer);
    // 내 수만 무르면 바로 AI 차례가 되어 무른 의미가 없다 → AI 수까지 같이 무른다
    const n = Math.min(game.turn === game.ai.color ? 1 : 2, game.history.length);
    for(let i=0;i<n;i++){ const m = game.history.pop(); game.board[m.r][m.c] = Omok.EMPTY; }
    game.turn = game.history.length % 2 === 0 ? Omok.BLACK : Omok.WHITE;   // 흑이 먼저 두니 짝수면 흑 차례
    aiSay(""); draw(); updateTurnUI();
    if(game.turn === game.ai.color) scheduleAI();   // 내가 백인데 전부 무른 경우 = AI가 다시 첫 수
    return;
  }
  const last = game.history.pop();
  game.board[last.r][last.c] = Omok.EMPTY;
  game.turn = game.turn===Omok.BLACK ? Omok.WHITE : Omok.BLACK;
  draw(); updateTurnUI(); clockSwitch(game.turn);
}

let msgTimer;
function flashMsg(text){
  const el = document.getElementById("gameMsg"); el.textContent = text;

async function endGame(color) {
  game.over = true; clockStop(); updateTurnUI(); draw();
  document.getElementById("replayBtn").style.display = "block";
  const winner = color===Omok.BLACK ? game.black : game.white;
  const loser  = color===Omok.BLACK ? game.white : game.black;
  const moves = game.history.map(h => [h.r, h.c]);
  const msg = document.getElementById("gameMsg");
  if(game.ai){ endAIGame(color === game.ai.color ? "l" : "w", moves, msg); return; }
  sfx.win(); playVictory(winner);
  if(!game.ranked){
    saveGameRecord("omok", game.black, game.white, winner.id, "win", moves, { ranked:false });
    msg.innerHTML = `🎉 <b>${esc(winner.name)}</b> 승리! · ${friendlyWhy()}`; return;
  }
  msg.textContent = `🎉 ${winner.name} 승리! 결과 기록 중…`;
  try {
    const r = await recordMatch(winner.id, loser.id);        // LP를 알아야 기록에 남길 수 있어 먼저 반영
    saveGameRecord("omok", game.black, game.white, winner.id, "win", moves, { ranked:true, lp:r.winner.lp_change });
    await loadStudents();
    showResultToast(r);
    msg.innerHTML = `🎉 <b>${esc(winner.name)}</b> 승리! (${winner===game.black?'흑':'백'}) — 랭킹에 반영됨`;
  } catch(e) {
    saveGameRecord("omok", game.black, game.white, winner.id, "win", moves, { ranked:true });
    msg.textContent = `승자: ${winner.name} · 기록 실패: ${e.message}`;
  }
}

function endDraw() {
  game.over = true; clockStop(); updateTurnUI(); draw();
  sfx.draw();
  document.getElementById("replayBtn").style.display = "block";
  const moves = game.history.map(h => [h.r, h.c]);
  if(game.ai){ endAIGame("d", moves, document.getElementById("gameMsg")); return; }
  saveGameRecord("omok", game.black, game.white, null, "draw", moves, { ranked: game.ranked });
  document.getElementById("gameMsg").innerHTML = `🤝 무승부! 판이 가득 찼어요 (점수 변동 없음)`;
}

function aiFallback(board, col){

    if(!Omok.analyze(board, r, c, col).forbidden) return [r,c];

}

function josa(word, withB, withoutB){

  return `${withB}(${withoutB})`;                 // 한글이 아니면 판단 불가
}

const TIME_PRESETS = { inf:null, "10":{main:600,inc:0}, "5":{main:300,inc:0}, "3":{main:180,inc:2} };
let timeControl = null;
function setTime(key){
  timeControl = TIME_PRESETS[key];
  ["inf","10","5","3"].forEach(k => document.getElementById("t_"+k).classList.toggle("active", k===key));
}
let clk = null;
function fmtClock(ms){ const s = Math.ceil(ms/1000); return Math.floor(s/60) + ":" + String(s%60).padStart(2,"0"); }
function clockStart(sides, turnKey, elMap, onTimeout){
  clockStop();
  if(!timeControl){ sides.forEach(k => { const e=document.getElementById(elMap[k]); if(e) e.textContent=""; }); return; }
  clk = { t:{}, inc:timeControl.inc*1000, running:turnKey, last:Date.now(), sides, elMap, onTimeout, dead:false };
  sides.forEach(k => clk.t[k] = timeControl.main*1000);
  clockRender(); requestAnimationFrame(clockLoop);
}
function clockSwitch(newKey){
  if(!clk || clk.dead) return;
  const now = Date.now();
  clk.t[clk.running] = clk.t[clk.running] - (now - clk.last) + clk.inc;   // 피셔 증가(둔 사람에게 가산)
  clk.last = now; clk.running = newKey; clockRender();
}
function clockStop(){ if(clk) clk.dead = true; clk = null; }
function clockLoop(){
  if(!clk || clk.dead) return;
  const now = Date.now(), r = clk.running;
  if(clk.t[r] - (now - clk.last) <= 0){
    clk.t[r] = 0; clockRender();
    const fn = clk.onTimeout, loser = r; clockStop(); fn(loser); return;   // 시간패 -> 상대 승
  }
  clockRender(); requestAnimationFrame(clockLoop);
}
function clockRender(){
  if(!clk) return;
  const now = Date.now();
  clk.sides.forEach(k => {
    const el = document.getElementById(clk.elMap[k]); if(!el) return;
    let ms = clk.t[k]; if(k===clk.running && !clk.dead) ms -= (now - clk.last); ms = Math.max(0, ms);
    el.textContent = "⏱ " + fmtClock(ms);
    el.classList.toggle("run", k===clk.running && !clk.dead);
    el.classList.toggle("low", ms <= 10000);
  });
}

let chessGame = null;
const CG = { k:"♚", q:"♛", r:"♜", b:"♝", n:"♞", p:"♟" };

function beginChess(white, black, ai){
  chessGame = { state: Chess.initialState(), white, black, sel:null, legal:[], over:false, moves:[],
                ranked: ai ? false : gameRanked, ai: ai || null };

    clockStop();

  }
}
function replayChess(){
  if(chessGame && chessGame.ai){ aiSetup.first = (chessGame.ai.color==="w"); gameType="chess"; startAIGame(); return; }  // 색 교대 = AI가 뒀던 색으로
  if(chessGame) beginChess(chessGame.black, chessGame.white);
}
// AI 차례면 잠깐 뒤 수를 둔다
function scheduleChessAI(){
  if(!chessGame || !chessGame.ai || chessGame.over) return;
  if(chessGame.state.turn !== chessGame.ai.color) return;
  const msg = document.getElementById("chessMsg"); if(msg) msg.textContent = "🤔 AI가 생각 중…";
  clearTimeout(aiTimer);
  aiTimer = setTimeout(() => {
    if(!chessGame || chessGame.over || chessGame.state.turn !== chessGame.ai.color) return;
    let mv = null;
    try { mv = ChessAI.chooseMove(chessGame.state, chessGame.ai.color, chessGame.ai.level); }
    catch(e){ console.error("체스 AI 오류", e); }
    if(!mv){ const all = Chess.allLegalMoves(chessGame.state, chessGame.ai.color); if(!all.length) return; mv = { from:all[0][0], to:all[0][1] }; }
    const promo = Chess.isPromotion(chessGame.state, mv.from, mv.to) ? (mv.promo || "q") : mv.promo;
    doChessMove(mv.from, mv.to, promo);
  }, 500);
}

function renderChess(){
  const b = chessGame.state.board, turn = chessGame.state.turn;
  const el = document.getElementById("chessBoard"); el.innerHTML = "";
  const legalSet = new Set(chessGame.legal.map(m => m[0]+","+m[1]));
  const chkKing = (!chessGame.over && Chess.inCheck(b, turn)) ? Chess.kingPos(b, turn) : null;
  // 스킨 적용: 판(칸색·테두리) + 기물(백/흑 각 플레이어의 장착 스킨)
  const bd = resolveChessBoard(chessGame.white, chessGame.black);
  const cpW = resolveChessPiece(chessGame.white, "w"), cpB = resolveChessPiece(chessGame.black, "b");
  el.style.borderColor = bd.border;
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const sq = document.createElement("div");
    sq.className = "csq " + ((r+c)%2 ? "dark":"light");
    sq.style.background = (r+c)%2 ? bd.dark : bd.light;   // sel/chk/legal은 CSS !important로 유지
    if(chessGame.sel && chessGame.sel[0]===r && chessGame.sel[1]===c) sq.classList.add("sel");
    if(legalSet.has(r+","+c)){ sq.classList.add("legal"); if(b[r][c]) sq.classList.add("cap"); }
    if(chkKing && chkKing[0]===r && chkKing[1]===c) sq.classList.add("chk");
    const p = b[r][c];
    if(p){ const sp=document.createElement("span"); const side=Chess.colorOf(p); const cp=side==="w"?cpW:cpB;
      sp.className="cpiece "+(side==="w"?"cw":"cb"); sp.textContent=CG[Chess.typeOf(p)];
      sp.style.color = cp.fill; if(cp.glow) sp.style.textShadow = `0 0 6px ${cp.glow},0 0 2px ${cp.glow}`;
      sq.appendChild(sp); }
    sq.onclick = () => chessClick(r,c);
    el.appendChild(sq);
  }
  document.getElementById("cpWhite").classList.toggle("turn", turn==="w" && !chessGame.over);
  document.getElementById("cpBlack").classList.toggle("turn", turn==="b" && !chessGame.over);
  if(!chessGame.over){
    const nm = turn==="w" ? chessGame.white.name : chessGame.black.name;
    const chk = Chess.inCheck(b, turn) ? " · ⚠️ 장군!" : "";
    document.getElementById("chessMsg").textContent = `${turn==="w"?"⚪ 백":"⚫ 흑"} (${nm}) 차례${chk}`;
  }
}

let pendingPromo = null;
function chessClick(r,c){
  if(!chessGame || chessGame.over) return;
  if(chessGame.ai && chessGame.state.turn === chessGame.ai.color) return;   // AI 차례엔 사람이 못 둔다
  const st = chessGame.state, p = st.board[r][c];
  if(chessGame.sel && chessGame.legal.some(m => m[0]===r && m[1]===c)){
    if(Chess.isPromotion(st, chessGame.sel, [r,c])){      // 승격이면 기물 선택창
      pendingPromo = { from: chessGame.sel, to: [r,c] };
      chessGame.sel = null; chessGame.legal = []; renderChess();
      document.getElementById("promoPicker").classList.add("show");
      return;
    }
    doChessMove(chessGame.sel, [r,c]); return;
  }
  if(p && Chess.colorOf(p)===st.turn){ chessGame.sel=[r,c]; chessGame.legal=Chess.legalMoves(st,r,c); renderChess(); }
  else { chessGame.sel=null; chessGame.legal=[]; renderChess(); }
}
function choosePromo(pc){
  document.getElementById("promoPicker").classList.remove("show");
  if(!pendingPromo) return;
  const { from, to, online } = pendingPromo; pendingPromo = null;
  if(online) sendChessOnlineMove(from, to, pc);   // 온라인 체스
  else doChessMove(from, to, pc);                 // 로컬 체스
}
function doChessMove(from, to, promo){
  const st = chessGame.state, mover = st.turn;
  chessGame.moves.push([from[0], from[1], to[0], to[1], promo]);
  chessGame.state = Chess.applyMove(st, from, to, promo);   // promo 없으면 기본 퀸
  chessGame.sel = null; chessGame.legal = [];
  sfx.place();
  renderChess();
  const stt = Chess.status(chessGame.state);
  if(stt === "checkmate"){ endChess(mover); return; }
  if(stt === "stalemate"){ chessDraw(); return; }
  if(chessGame.ai) scheduleChessAI();
  else clockSwitch(chessGame.state.turn);
}

function endChessAIResult(winnerColor){
  const iWon = winnerColor !== chessGame.ai.color;
  const L = aiLevel("chess", chessGame.ai.level);
  aiRecordAdd("chess", chessGame.ai.level, iWon ? "w" : "l");
  const human = chessGame.ai.color==="w" ? chessGame.black : chessGame.white;
  if(iWon){ sfx.win(); playVictory(human); } else sfx.draw();
  const head = iWon ? `🎉 <b>${L.emoji} AI ${L.name}</b> 에게 이겼어요! 대단해요 👏`
                    : `😢 <b>${L.emoji} AI ${L.name}</b> 에게 졌어요. 다시 도전!`;
  document.getElementById("chessMsg").innerHTML = `${head} · <span style="font-weight:600">이번 ${L.name} 전적 ${esc(aiRecordText("chess", chessGame.ai.level))}</span>`;
}
async function endChess(winnerColor){
  chessGame.over = true; clockStop(); clearTimeout(aiTimer);
  const winner = winnerColor==="w" ? chessGame.white : chessGame.black;
  const loser  = winnerColor==="w" ? chessGame.black : chessGame.white;
  document.getElementById("cResignBtn").disabled = true;
  document.getElementById("cReplayBtn").style.display = "block";
  document.getElementById("cpWhite").classList.remove("turn"); document.getElementById("cpBlack").classList.remove("turn");
  if(chessGame.ai){ endChessAIResult(winnerColor); return; }   // 연습 대국: 서버 기록 없음
  const save = (opt) => saveGameRecord("chess", chessGame.white, chessGame.black, winner.id, "win", chessGame.moves, opt);
  sfx.win(); playVictory(winner);
  const msg = document.getElementById("chessMsg");
  if(!chessGame.ranked){
    save({ ranked:false });
    msg.innerHTML = `🎉 <b>${esc(winner.name)}</b> 승리! · ${friendlyWhy()}`; return;
  }
  msg.textContent = `🎉 ${winner.name} 승리! 기록 중…`;
  try {
    const r = await recordMatch(winner.id, loser.id);
    save({ ranked:true, lp:r.winner.lp_change });
    await loadStudents(); showResultToast(r);
    msg.innerHTML = `🎉 <b>${esc(winner.name)}</b> 승리! — 랭킹 반영됨`;
  } catch(e){ save({ ranked:true }); msg.textContent = `${winner.name} 승리 · 기록 실패: ${e.message}`; }
}
function chessDraw(){
  chessGame.over = true; clockStop(); clearTimeout(aiTimer);
  document.getElementById("cResignBtn").disabled = true;
  document.getElementById("cReplayBtn").style.display = "block";
  document.getElementById("cpWhite").classList.remove("turn"); document.getElementById("cpBlack").classList.remove("turn");
  sfx.draw();
  if(chessGame.ai){
    aiRecordAdd("chess", chessGame.ai.level, "d");
    document.getElementById("chessMsg").textContent = "🤝 스테일메이트 · 무승부";
    return;
  }
  saveGameRecord("chess", chessGame.white, chessGame.black, null, "draw", chessGame.moves, { ranked: chessGame.ranked });
  document.getElementById("chessMsg").textContent = "🤝 스테일메이트 · 무승부 (점수 변동 없음)";
}
function chessResign(){
  if(!chessGame || chessGame.over) return;
  const turn = chessGame.state.turn;
  const who = turn==="w" ? chessGame.white.name : chessGame.black.name;
  if(!confirm(`${who} 님이 기권할까요? 상대가 승리합니다.`)) return;
  endChess(Chess.opp(turn));
}

// ==================== 장기 ====================
let janggiGame = null;
const JG = { r:{k:"漢",a:"士",c:"車",o:"包",h:"馬",e:"象",p:"兵"}, b:{k:"楚",a:"士",c:"車",o:"包",h:"馬",e:"象",p:"卒"} };

function beginJanggi(red, blue, ai){   // red=한(아래·선공), blue=초(위)
  janggiGame = { state: Janggi.initialState(), red, blue, sel:null, legal:[], over:false, moves:[],
                 ranked: ai ? false : gameRanked, ai: ai || null };
  document.getElementById("gameSetup").style.display = "none";
  document.getElementById("janggiArea").classList.add("active");
  document.getElementById("jnRed").textContent = red.name;
  document.getElementById("jnBlue").textContent = blue.name;
  document.getElementById("jReplayBtn").style.display = "none";
  document.getElementById("jResignBtn").disabled = false;
  renderJanggi();
  if(ai){   // 연습 대국은 시계 미사용
    clockStop();
    document.getElementById("clkJR").textContent = ""; document.getElementById("clkJB").textContent = "";
    scheduleJanggiAI();
  } else {
    clockStart(["r","b"], "r", { r:"clkJR", b:"clkJB" },
      (loser) => { quickToast(`⏱️ ${(loser==="r"?janggiGame.red:janggiGame.blue).name} 님 시간 초과!`); endJanggi(Janggi.opp(loser)); });
  }
}
function replayJanggi(){
  if(janggiGame && janggiGame.ai){ aiSetup.first = (janggiGame.ai.color==="r"); gameType="janggi"; startAIGame(); return; }  // 색 교대
  if(janggiGame) beginJanggi(janggiGame.blue, janggiGame.red);
}
function scheduleJanggiAI(){
  if(!janggiGame || !janggiGame.ai || janggiGame.over) return;
  if(janggiGame.state.turn !== janggiGame.ai.color) return;
  const msg = document.getElementById("janggiMsg"); if(msg) msg.textContent = "🤔 AI가 생각 중…";
  clearTimeout(aiTimer);
  aiTimer = setTimeout(() => {
    if(!janggiGame || janggiGame.over || janggiGame.state.turn !== janggiGame.ai.color) return;
    let mv = null;
    try { mv = JanggiAI.chooseMove(janggiGame.state, janggiGame.ai.color, janggiGame.ai.level); }
    catch(e){ console.error("장기 AI 오류", e); }
    if(!mv){   // 둘 곳이 없으면(희귀) 첫 합법수
      outer: for(let r=0;r<10;r++) for(let c=0;c<9;c++){ const p=janggiGame.state.board[r][c];
        if(p && Janggi.col(p)===janggiGame.ai.color){ const ms=Janggi.legalMoves(janggiGame.state,r,c); if(ms.length){ mv={from:[r,c],to:ms[0]}; break outer; } } }
    }
    if(!mv) return;
    doJanggiMove(mv.from, mv.to);
  }, 500);
}

function renderJanggi(){
  const b = janggiGame.state.board, turn = janggiGame.state.turn;
  const el = document.getElementById("janggiBoard"); el.innerHTML = "";
  const legalSet = new Set(janggiGame.legal.map(m => m[0]+","+m[1]));
  // 스킨 적용: 판(바탕·선·궁성·테두리) + 기물(한/초 각 플레이어의 장착 스킨)
  const bd = resolveJanggiBoard(janggiGame.red, janggiGame.blue);
  const jpR = resolveJanggiPiece(janggiGame.red, "r"), jpB = resolveJanggiPiece(janggiGame.blue, "b");
  el.style.background = bd.bg; el.style.borderColor = bd.border;
  for(let r=0;r<10;r++) for(let c=0;c<9;c++){
    const sq = document.createElement("div");
    sq.className = "jsq" + (Janggi.inPalace(r,c) ? " palace" : "");
    sq.style.borderColor = bd.line;
    if(Janggi.inPalace(r,c)) sq.style.background = bd.palace;
    if(janggiGame.sel && janggiGame.sel[0]===r && janggiGame.sel[1]===c) sq.classList.add("sel");
    if(legalSet.has(r+","+c)){ sq.classList.add("legal"); if(b[r][c]) sq.classList.add("cap"); }
    const p = b[r][c];
    if(p){ const d=document.createElement("div"); const side=Janggi.col(p); const jp=side==="r"?jpR:jpB;
      d.className="jpiece "+(side==="r"?"jr":"jb"); d.textContent=JG[side][Janggi.typ(p)];
      d.style.background=jp.disk; d.style.color=jp.text; d.style.borderColor=jp.border;
      if(jp.glow) d.style.boxShadow=`0 1px 2px rgba(0,0,0,.3),0 0 7px ${jp.glow}`;
      sq.appendChild(d); }
    sq.onclick = () => janggiClick(r,c);
    el.appendChild(sq);
  }
  document.getElementById("jpRed").classList.toggle("turn", turn==="r" && !janggiGame.over);
  document.getElementById("jpBlue").classList.toggle("turn", turn==="b" && !janggiGame.over);
  if(!janggiGame.over){
    const nm = turn==="r" ? janggiGame.red.name : janggiGame.blue.name;
    document.getElementById("janggiMsg").textContent = `${turn==="r"?"🔴 한":"🟢 초"} (${nm}) 차례`;
  }
}
function janggiClick(r,c){
  if(!janggiGame || janggiGame.over) return;
  if(janggiGame.ai && janggiGame.state.turn === janggiGame.ai.color) return;   // AI 차례엔 사람이 못 둔다
  const st = janggiGame.state, p = st.board[r][c];
  if(janggiGame.sel && janggiGame.legal.some(m => m[0]===r && m[1]===c)){ doJanggiMove(janggiGame.sel, [r,c]); return; }
  if(p && Janggi.col(p)===st.turn){ janggiGame.sel=[r,c]; janggiGame.legal=Janggi.legalMoves(st,r,c); renderJanggi(); }
  else { janggiGame.sel=null; janggiGame.legal=[]; renderJanggi(); }
}
function doJanggiMove(from, to){
  const st = janggiGame.state, mover = st.turn;
  janggiGame.moves.push([from[0], from[1], to[0], to[1]]);
  const { state, captured } = Janggi.applyMove(st, from, to);
  janggiGame.state = state; janggiGame.sel=null; janggiGame.legal=[];
  sfx.place(); renderJanggi();
  if(captured && Janggi.typ(captured)==="k"){ endJanggi(mover); return; }   // 궁 포획 = 승리
  if(janggiGame.ai) scheduleJanggiAI();
  else clockSwitch(janggiGame.state.turn);
}
function endJanggiAIResult(winnerColor){
  const iWon = winnerColor !== janggiGame.ai.color;
  const L = aiLevel("janggi", janggiGame.ai.level);
  aiRecordAdd("janggi", janggiGame.ai.level, iWon ? "w" : "l");
  const human = janggiGame.ai.color==="r" ? janggiGame.blue : janggiGame.red;
  if(iWon){ sfx.win(); playVictory(human); } else sfx.draw();
  const head = iWon ? `🎉 <b>${L.emoji} AI ${L.name}</b> 에게 이겼어요! (궁 포획) 👏`
                    : `😢 <b>${L.emoji} AI ${L.name}</b> 에게 졌어요. 다시 도전!`;
  document.getElementById("janggiMsg").innerHTML = `${head} · <span style="font-weight:600">이번 ${L.name} 전적 ${esc(aiRecordText("janggi", janggiGame.ai.level))}</span>`;
}
async function endJanggi(winnerColor){
  janggiGame.over = true; clockStop(); clearTimeout(aiTimer);
  const winner = winnerColor==="r" ? janggiGame.red : janggiGame.blue;
  const loser  = winnerColor==="r" ? janggiGame.blue : janggiGame.red;
  document.getElementById("jResignBtn").disabled = true;
  document.getElementById("jReplayBtn").style.display = "block";
  document.getElementById("jpRed").classList.remove("turn"); document.getElementById("jpBlue").classList.remove("turn");
  if(janggiGame.ai){ endJanggiAIResult(winnerColor); return; }   // 연습 대국: 서버 기록 없음
  const save = (opt) => saveGameRecord("janggi", janggiGame.red, janggiGame.blue, winner.id, "win", janggiGame.moves, opt);
  sfx.win(); playVictory(winner);
  const msg = document.getElementById("janggiMsg");
  if(!janggiGame.ranked){
    save({ ranked:false });
    msg.innerHTML = `🎉 <b>${esc(winner.name)}</b> 승리! (궁 포획) · ${friendlyWhy()}`; return;
  }
  msg.textContent = `🎉 ${winner.name} 승리! (궁 포획) 기록 중…`;
  try {
    const r = await recordMatch(winner.id, loser.id);
    save({ ranked:true, lp:r.winner.lp_change });
    await loadStudents(); showResultToast(r);
    msg.innerHTML = `🎉 <b>${esc(winner.name)}</b> 승리! — 랭킹 반영됨`;
  } catch(e){ save({ ranked:true }); msg.textContent = `${winner.name} 승리 · 기록 실패: ${e.message}`; }
}
function janggiResign(){
  if(!janggiGame || janggiGame.over) return;
  const turn = janggiGame.state.turn;
  const who = turn==="r" ? janggiGame.red.name : janggiGame.blue.name;
  if(!confirm(`${who} 님이 기권할까요? 상대가 승리합니다.`)) return;
  endJanggi(Janggi.opp(turn));
}

let replayGames = {};
let review = null, replayViewerId = null;
const GAME_LABEL = { omok:"⚫ 오목", chess:"♟️ 체스", janggi:"🏯 장기" };

async function openReplayList(id){
  const s = students.find(x => x.id === id);
  replayViewerId = id;                 // 이 학생 시점으로 판을 보여준다 (체스: 흑이면 뒤집힘)
  const body = document.getElementById("detailBody");
  openModal("detailBack");
  body.innerHTML = `<span class="close-x" onclick="closeModal('detailBack')">✕</span>
    <h2>📖 ${esc(s ? s.name : "")} 복기</h2><div class="empty">불러오는 중…</div>`;
  try {
    const games = await fetchGameRecords(id, 20);
    replayGames = {}; games.forEach(g => replayGames[g.id] = g);
    const list = games.length
      ? games.map(g => replayRow(g, id)).join("")
      : `<div class="empty">아직 저장된 대국이 없어요.<br>대국을 한 판 두면 여기서 다시 볼 수 있어요!</div>`;
    body.innerHTML = `<span class="close-x" onclick="closeModal('detailBack')">✕</span>
      <h2>📖 ${esc(s.name)} 복기</h2>
      <div class="tg-note" style="margin:0 0 10px">대국을 눌러 수순을 하나씩 되짚어 보며 배워요 🧠</div>
      ${list}
      <button class="mini-btn" style="margin-top:12px" onclick="openDetail(${id})">← 돌아가기</button>`;
  } catch(e){ body.innerHTML = `<div class="empty">${e.message}</div>`; }
}
function replayRow(g, viewerId){
  const icon = g.game_type === "omok" ? "⚫" : g.game_type === "chess" ? "♟️" : "🏯";
  const opp = g.p1_id === viewerId ? g.p2_name : g.p1_name;
  const res = g.result === "draw" ? '<span style="color:var(--sub)">무</span>'
    : g.winner_id === viewerId ? '<span class="lp-up">승</span>' : '<span class="lp-down">패</span>';
  return `<div class="feed-row" style="cursor:pointer" onclick="openReplay(${g.id})">
    <span>${icon}</span><span class="vs">vs ${esc(opp)} · ${g.moves.length}수</span>${res}
    <span style="color:var(--orange-deep);font-weight:800">▶</span></div>`;
}
function openReplay(gameId){
  const g = replayGames[gameId]; if(!g) return;
  showReplay(g);
}
// 저장된 기록이든 방금 둔 AI 연습 대국이든 같은 화면으로 복기한다
function showReplay(g){
  review = { game: g, idx: g.moves.length, coach: null, opening: null };
  // 오목이면 전체 수를 미리 분석해 둔다 (수당 ~4ms)
  if(g.game_type === "omok" && window.OmokCoach){
    try {
      review.coach = g.moves.map((_, i) => OmokCoach.reviewMove(g.moves, i + 1, { vcfDepth: 4 }));
      review.opening = OmokCoach.opening(g.moves);
    } catch(e){ console.error("coach", e); review.coach = null; }
  }
  const resultTxt = g.result === "draw" ? "무승부"
    : (g.winner_id === g.p1_id ? g.p1_name : g.p2_name) + " 승";
  document.getElementById("replayBody").innerHTML = `
    <span class="close-x" onclick="closeModal('replayBack')">✕</span>
    <h2>${GAME_LABEL[g.game_type]} 복기</h2>
    <div class="tg-note" style="margin:0 0 8px">${esc(g.p1_name)} vs ${esc(g.p2_name)} · ${esc(resultTxt)}${
      review.opening ? ` · 정석 <b>${esc(review.opening.name)}</b>` : ""}</div>
    ${replaySummaryHTML()}
    <div class="board-wrap"><div id="replayBoard"></div></div>
    <div id="replayFeedback" class="replay-fb"></div>
    <div class="game-btns" style="margin-top:12px">
      <button class="btn btn-ghost" onclick="replaySeek(0)">⏮</button>
      <button class="btn btn-ghost" onclick="replayStep(-1)">◀ 이전</button>
      <button class="btn btn-primary" id="replayCount"></button>
      <button class="btn btn-ghost" onclick="replayStep(1)">다음 ▶</button>
      <button class="btn btn-ghost" onclick="replaySeek(review.game.moves.length)">⏭</button>
    </div>
    ${review.coach ? `<div class="game-btns" style="margin-top:6px">
      <button class="btn btn-ghost" onclick="replayNextIssue()">❗ 아쉬웠던 수로 이동</button></div>` : ""}`;
  openModal("replayBack");
  renderReplay();
}
// 대국 리포트: 색깔별로 좋은 수 / 실수 개수
function replaySummaryHTML(){
  if(!review.coach) return "";
  const cnt = { 1:{}, 2:{} };
  review.coach.forEach((f, i) => {
    const col = i % 2 === 0 ? 1 : 2;
    cnt[col][f.grade] = (cnt[col][f.grade] || 0) + 1;
  });
  const row = (col) => {
    const c = cnt[col], parts = [];
    if(c.brilliant) parts.push(`<span class="rep-chip g-brilliant">⭐ 최고 ${c.brilliant}</span>`);
    if(c.good) parts.push(`<span class="rep-chip g-brilliant">👍 좋은수 ${c.good}</span>`);
    if(c.mistake || c.inaccuracy) parts.push(`<span class="rep-chip g-mistake">❗ 아쉬움 ${(c.mistake||0)+(c.inaccuracy||0)}</span>`);
    if(c.blunder) parts.push(`<span class="rep-chip g-blunder">💥 큰실수 ${c.blunder}</span>`);
    if(!parts.length) return "";
    return `<div class="rep-sum"><span class="rep-chip">${col===1?"⚫흑":"⚪백"}</span>${parts.join("")}</div>`;
  };
  return row(1) + row(2);
}
// 다음 실수/아쉬운 수로 점프
function replayNextIssue(){
  if(!review.coach) return;
  const bad = ["inaccuracy","mistake","blunder"];
  const n = review.coach.length;
  for(let k=1; k<=n; k++){
    const i = (review.idx + k - 1) % n;            // 현재 다음부터 순환 탐색
    if(bad.includes(review.coach[i].grade)){ replaySeek(i+1); return; }
  }
  const fb = document.getElementById("replayFeedback");
  if(fb){ fb.innerHTML = "🎉 아쉬운 수가 하나도 없어요! 훌륭한 대국이에요."; fb.className = "replay-fb good"; }
}
function replayStep(d){ const n = review.game.moves.length; review.idx = Math.max(0, Math.min(n, review.idx + d)); renderReplay(); }
function replaySeek(i){ review.idx = i; renderReplay(); }

function reconstructChess(moves, upto){
  let s = Chess.initialState();
  for(let i=0;i<upto;i++){ const m = moves[i]; s = Chess.applyMove(s, [m[0],m[1]], [m[2],m[3]], m[4]); }
  return s.board;
}
function reconstructJanggi(moves, upto){
  let s = Janggi.initialState();
  for(let i=0;i<upto;i++){ const m = moves[i]; s = Janggi.applyMove(s, [m[0],m[1]], [m[2],m[3]]).state; }
  return s.board;
}
function renderReplay(){
  const g = review.game, idx = review.idx, el = document.getElementById("replayBoard");
  const last = idx > 0 ? g.moves[idx-1] : null;
  const f = (review.coach && idx >= 1) ? review.coach[idx-1] : null;
  // 복기 중인 학생이 후공(체스=흑)이면 그 학생 시점으로 판을 뒤집는다
  const flip = g.game_type === "chess" && replayViewerId != null && g.p2_id === replayViewerId;
  if(g.game_type === "omok") el.innerHTML = replayOmokHTML(g.moves, idx, last, f);
  else if(g.game_type === "chess") el.innerHTML = replayGridHTML(reconstructChess(g.moves, idx), 8, 8, "chess", last, flip);
  else el.innerHTML = replayGridHTML(reconstructJanggi(g.moves, idx), 10, 9, "janggi", last);
  document.getElementById("replayCount").textContent = `${idx} / ${g.moves.length} 수`;
  const fb = document.getElementById("replayFeedback");
  if(!fb) return;
  if(f){
    const who = (idx-1)%2===0 ? "⚫흑" : "⚪백";
    fb.innerHTML = `<div class="fb-head"><span class="fb-badge">${idx}수 ${who}</span>
        <span>${f.icon} ${esc(f.label)}</span></div>${f.text}
      ${f.hint ? `<div style="margin-top:4px;font-size:12px;opacity:.85">🟢 초록 점선이 더 좋았던 자리예요</div>` : ""}`;
    fb.className = "replay-fb " + f.cls;
  } else if(g.game_type === "omok"){
    fb.innerHTML = "▶ 버튼으로 한 수씩 넘기며 코칭을 받아보세요"; fb.className = "replay-fb tip";
  } else { fb.innerHTML = "체스·장기 복기 (코칭은 오목만 지원)"; fb.className = "replay-fb tip"; }
}

const OMOK_STAR = new Set(["3,3","3,11","11,3","11,11","7,7"]);
const isStar = (r,c) => OMOK_STAR.has(r+","+c);
function omokGridStyle(width, skin){
  const s = skin || DEFAULT_BOARD;
  return `grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(15,1fr);aspect-ratio:1;`
       + `width:${width};background:${s.bg};--ln:${s.line};--st:${s.star||s.line}`;
}
function replayOmokHTML(moves, upto, last, f){
  const N = 15, b = Array.from({length:N},()=>Array(N).fill(0));
  for(let i=0;i<upto;i++){ const [r,c] = moves[i]; b[r][c] = i % 2 === 0 ? 1 : 2; }
  const at = (list, r, c) => !!(list && list.some(p => p[0]===r && p[1]===c));
  let h = `<div class="rgrid romok" style="${omokGridStyle("min(84vmin,340px)")}">`;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    let cls = (isStar(r,c) && !b[r][c]) ? " star" : "";
    if(last && last[0]===r && last[1]===c) cls += " rlast";
    if(f && !b[r][c]){
      if(f.hint && f.hint[0]===r && f.hint[1]===c) cls += " rhint";
      else if(at(f.marks, r, c)) cls += " rmark";
    }
    const inner = b[r][c] ? `<span class="rstone ${b[r][c]===1?'bk':'wt'}"></span>` : "";
    h += `<div class="rsq${cls}">${inner}</div>`;
  }
  return h + `</div>`;
}
function replayGridHTML(board, rows, cols, type, last, flip){
  const w = "width:min(84vmin,340px)";
  let h = `<div class="rgrid r${type}" style="grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${rows},1fr);aspect-ratio:${cols}/${rows};${w}">`;
  for(let dr=0;dr<rows;dr++) for(let dc=0;dc<cols;dc++){
    const r = flip ? rows-1-dr : dr, c = flip ? cols-1-dc : dc;
    const isLast = last && ((last[0]===r&&last[1]===c) || (last[2]===r&&last[3]===c));
    const p = board[r][c]; let extra = "", inner = "";
    if(type === "chess"){
      extra = (r+c)%2 ? "dark" : "light";
      if(p) inner = `<span class="${Chess.colorOf(p)==='w'?'rc':'rcb'}">${CG[Chess.typeOf(p)]}</span>`;
    } else {
      extra = Janggi.inPalace(r,c) ? "palace" : "";
      if(p) inner = `<span class="rdisk ${Janggi.col(p)==='r'?'jr':'jb'}">${JG[Janggi.col(p)][Janggi.typ(p)]}</span>`;
    }
    h += `<div class="rsq ${extra}${isLast?' rlast':''}">${inner}</div>`;
  }
  return h + `</div>`;
}
