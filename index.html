<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>우리 반 오목 랭킹</title>
<style>
  :root {
    --orange: #ff8a3d; --orange-deep: #ff6f1f; --yellow: #ffcf5c;
    --bg: #fff7ec; --card: #fff; --text: #3d2b1f; --sub: #9b8574;
    --shadow: 0 6px 18px rgba(255,138,61,0.15);
    --up: #ff5a5a; --down: #3f8cff;
    --board: #e9b96e; --line: #7a5230;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:80px; overflow-x:hidden; }
  header { background:linear-gradient(135deg,var(--orange),var(--yellow)); padding:20px 18px 16px; color:#fff;
    border-radius:0 0 24px 24px; box-shadow:var(--shadow); position:sticky; top:0; z-index:10; }
  header h1 { margin:0; font-size:21px; font-weight:800; letter-spacing:-0.5px; }
  header p { margin:3px 0 0; font-size:12.5px; opacity:0.92; }
  .wrap { max-width:520px; margin:0 auto; padding:14px 14px; }

  /* 탭 */
  .tabs { display:flex; gap:5px; max-width:520px; margin:12px auto 0; padding:0 10px; }
  .tab { flex:1; text-align:center; padding:10px 1px; border-radius:11px; font-weight:700; font-size:12.5px;
    background:#fff; color:var(--sub); box-shadow:var(--shadow); cursor:pointer; white-space:nowrap; }
  .tab.active { background:var(--orange-deep); color:#fff; }

  .card { background:var(--card); border-radius:18px; box-shadow:var(--shadow); padding:14px 16px;
    margin-bottom:12px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:transform .12s; }
  .card:active { transform:scale(0.98); }
  .rank-badge { width:34px; height:34px; flex:none; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-weight:800; font-size:15px; background:#f1e7db; color:var(--sub); }
  .rank-1 { background:linear-gradient(135deg,#ffd24d,#ffb300); color:#fff; }
  .rank-2 { background:linear-gradient(135deg,#d9dee6,#aab4c2); color:#fff; }
  .rank-3 { background:linear-gradient(135deg,#f0b98a,#d98b4f); color:#fff; }
  .info { flex:1; min-width:0; }
  .info .name { font-size:17px; font-weight:700; }
  .info .sub { font-size:12.5px; color:var(--sub); margin-top:3px; }
  .tier-pill { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:999px;
    font-size:12px; font-weight:700; color:#fff; }
  /* 티어 안내표 */
  .tier-guide { display:flex; align-items:center; justify-content:center; gap:2px; background:#fff;
    border-radius:16px; box-shadow:var(--shadow); padding:12px 8px; margin-bottom:8px; flex-wrap:wrap; }
  .tg-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 6px;
    border-bottom:3px solid; border-radius:4px; min-width:48px; }
  .tg-em { font-size:20px; } .tg-nm { font-size:11px; font-weight:800; }
  .tg-arrow { color:var(--sub); font-size:16px; font-weight:800; }
  .tg-note { text-align:center; font-size:12px; color:var(--sub); font-weight:600; margin:0 0 14px; }
  .lp-box { text-align:right; flex:none; }
  .lp-box .lp { font-size:18px; font-weight:800; color:var(--orange-deep); }
  .lp-box .lp small { font-size:11px; color:var(--sub); font-weight:600; }
  .lp-box .next-tier { font-size:10px; color:var(--sub); font-weight:700; margin-top:2px; white-space:nowrap; }
  .gauge { height:6px; background:#f1e7db; border-radius:999px; margin-top:6px; overflow:hidden; }
  .gauge>div { height:100%; background:linear-gradient(90deg,var(--orange),var(--yellow)); border-radius:999px; transition:width .6s; }

  .fab-bar { position:fixed; bottom:0; left:0; right:0; display:flex; gap:10px;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom)); max-width:520px; margin:0 auto;
    background:linear-gradient(to top,var(--bg) 70%,transparent); }
  .btn { flex:1; border:none; border-radius:14px; padding:15px 0; font-size:15px; font-weight:700; color:#fff;
    cursor:pointer; box-shadow:var(--shadow); }
  .btn-primary { background:linear-gradient(135deg,var(--orange-deep),var(--orange)); }
  .btn-ghost { background:#fff; color:var(--orange-deep); border:2px solid var(--orange); }
  .btn:disabled { opacity:.5; }

  .modal-back { position:fixed; inset:0; background:rgba(60,43,31,0.45); display:none; align-items:flex-end;
    justify-content:center; z-index:50; }
  .modal-back.open { display:flex; }
  .modal { background:#fff; width:100%; max-width:520px; border-radius:22px 22px 0 0; padding:22px 20px 28px;
    animation:slideUp .25s ease; max-height:88vh; overflow-y:auto; }
  @keyframes slideUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
  .modal h2 { margin:0 0 16px; font-size:19px; }
  .modal label { display:block; font-size:13px; color:var(--sub); margin:12px 0 6px; font-weight:600; }
  .modal input, .modal select { width:100%; padding:13px 14px; font-size:15px; border:2px solid #f0e5d8;
    border-radius:12px; background:#fffdf9; -webkit-appearance:none; appearance:none; }
  .modal input:focus, .modal select:focus { outline:none; border-color:var(--orange); }
  .modal .row { display:flex; gap:10px; } .modal .row>div { flex:1; }
  .close-x { float:right; font-size:22px; color:var(--sub); cursor:pointer; line-height:1; }
  .empty { text-align:center; color:var(--sub); padding:40px 0; font-size:14px; }
  .hist-item { display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid #f4ece1; font-size:14px; }
  .hist-item:last-child { border-bottom:none; }
  .badge-r { flex:none; width:26px; height:26px; border-radius:8px; display:flex; align-items:center;
    justify-content:center; font-weight:800; font-size:12px; color:#fff; }
  .badge-w { background:var(--up); } .badge-l { background:var(--down); }

  .toast { position:fixed; top:84px; left:50%; transform:translateX(-50%) translateY(-20px); background:#fff;
    border-radius:16px; box-shadow:var(--shadow); padding:16px 20px; z-index:100; opacity:0; pointer-events:none;
    transition:opacity .3s,transform .3s; min-width:240px; max-width:90%; text-align:center; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .t-row { display:flex; justify-content:space-between; align-items:center; margin:6px 0; font-size:15px; gap:16px; }
  .lp-up { color:var(--up); font-weight:800; } .lp-down { color:var(--down); font-weight:800; }
  .pop { display:inline-block; animation:pop .5s ease; }
  @keyframes pop { 0%{transform:scale(1);} 40%{transform:scale(1.5);} 100%{transform:scale(1);} }
  .promo { font-size:13px; color:var(--orange-deep); font-weight:700; margin-top:6px; }

  /* 오목판 */
  #playView { display:none; }
  #gameArea { display:none; }
  #gameArea.active { display:block; }
  #chessArea { display:none; }
  #chessArea.active { display:block; }
  /* 게임 종류 선택 */
  .gtype { display:flex; gap:8px; margin-bottom:14px; }
  .gt { flex:1; padding:12px 0; border-radius:12px; border:2px solid #f0e5d8; background:#fffdf9; color:var(--sub);
    font-weight:800; font-size:15px; cursor:pointer; }
  .gt.active { background:var(--orange-deep); color:#fff; border-color:var(--orange-deep); }
  /* 체스판 */
  #chessBoard { display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr);
    width:min(90vmin,440px); aspect-ratio:1;
    border:5px solid #6b4423; border-radius:6px; box-shadow:var(--shadow); overflow:hidden; touch-action:manipulation; }
  .csq { display:flex; align-items:center; justify-content:center; font-size:min(8vmin,33px); line-height:1;
    cursor:pointer; user-select:none; position:relative; }
  .csq.light { background:#f0d9b5; } .csq.dark { background:#b58863; }
  .csq.sel { background:#f7ec6e !important; }
  .csq.legal::after { content:""; position:absolute; width:30%; height:30%; border-radius:50%; background:rgba(20,20,20,0.30); }
  .csq.legal.cap::after { width:86%; height:86%; border-radius:50%; background:transparent; border:4px solid rgba(20,20,20,0.30); }
  .csq.chk { background:#ff8f8f !important; }
  .cpiece { pointer-events:none; }
  .cw { color:#fdfdfd; text-shadow:0 0 2px #000, 0 1px 1px rgba(0,0,0,.7); }
  .cb { color:#1c1c1c; text-shadow:0 0 1px rgba(255,255,255,.4); }
  /* 장기판 */
  #janggiArea { display:none; }
  #janggiArea.active { display:block; }
  #janggiBoard { display:grid; grid-template-columns:repeat(9,1fr); grid-template-rows:repeat(10,1fr);
    width:min(94vmin,432px); aspect-ratio:9/10;
    background:#e6c179; border:4px solid #6b4423; border-radius:6px; overflow:hidden; touch-action:manipulation; }
  .jsq { position:relative; display:flex; align-items:center; justify-content:center;
    border:0.5px solid rgba(107,68,35,0.45); cursor:pointer; }
  .jsq.palace { background:rgba(150,95,40,0.16); }
  .jsq.sel { background:#f7ec6e !important; }
  .jpiece { width:80%; aspect-ratio:1; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:min(5.4vmin,23px); background:#f6e6bf; border:2px solid; box-shadow:0 1px 2px rgba(0,0,0,.3); }
  .jpiece.jr { color:#c0261b; border-color:#c0261b; }
  .jpiece.jb { color:#0a7d3a; border-color:#0a7d3a; }
  .jsq.legal::after { content:""; position:absolute; width:26%; height:26%; border-radius:50%; background:rgba(20,20,20,.32); }
  .jsq.legal.cap::after { width:82%; height:82%; background:transparent; border:3px solid rgba(20,20,20,.38); border-radius:50%; }
  /* 복기 보드 */
  .rgrid { display:grid; background:#e6c179; border:3px solid #6b4423; border-radius:5px; overflow:hidden; margin:0 auto; }
  .rgrid.rchess { font-size:min(6.5vmin,25px); }
  .rgrid.rjanggi .rdisk { font-size:min(4.2vmin,17px); }
  .rsq { position:relative; display:flex; align-items:center; justify-content:center;
    border:0.5px solid rgba(107,68,35,0.4); font-weight:900; }
  .rsq.light { background:#f0d9b5; } .rsq.dark { background:#b58863; }
  .rsq.palace { background:rgba(150,95,40,0.16); }
  .rsq.rlast { box-shadow:inset 0 0 0 3px #f7d84e; }
  .rsq .rc { color:#fdfdfd; text-shadow:0 0 2px #000,0 1px 1px rgba(0,0,0,.7); }
  .rsq .rcb { color:#1c1c1c; text-shadow:0 0 1px rgba(255,255,255,.4); }
  .rdisk { width:84%; aspect-ratio:1; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:#f6e6bf; border:2px solid; box-shadow:0 1px 1px rgba(0,0,0,.3); }
  .rdisk.jr { color:#c0261b; border-color:#c0261b; } .rdisk.jb { color:#0a7d3a; border-color:#0a7d3a; }
  .rstone { width:76%; aspect-ratio:1; border-radius:50%; }
  .rstone.bk { background:radial-gradient(circle at 35% 32%,#555,#111); }
  .rstone.wt { background:radial-gradient(circle at 35% 32%,#fff,#cfd3d8); border:1px solid #ccc; }
  #replayCount { pointer-events:none; }
  /* 승격 선택창 */
  .promo-picker { position:fixed; inset:0; background:rgba(60,43,31,0.55); z-index:120;
    display:none; align-items:center; justify-content:center; flex-direction:column; }
  .promo-picker.show { display:flex; }
  .promo-title { color:#fff; font-weight:800; margin-bottom:14px; font-size:16px; }
  .promo-opts { display:flex; gap:10px; background:#fff; padding:16px; border-radius:18px; box-shadow:var(--shadow); }
  .promo-opts button { width:62px; height:80px; border:2px solid #f0e5d8; border-radius:12px; background:#fffdf9;
    font-size:36px; color:#1c1c1c; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .promo-opts button span { font-size:12px; font-weight:800; color:var(--sub); margin-top:2px; }
  .promo-opts button:active { background:#fff0dd; }
  .rotate-hint { text-align:center; font-size:12.5px; color:#8a6d1a; background:#fff3d6;
    border:1px solid #ffdd8f; border-radius:10px; padding:7px 10px; margin:0 0 10px; }
  .players { display:flex; gap:10px; margin-bottom:12px; }
  .pl-card { flex:1; background:#fff; border-radius:14px; box-shadow:var(--shadow); padding:10px 12px; text-align:center;
    border:3px solid transparent; }
  .pl-card.turn { border-color:var(--orange); }
  .pl-card .stone { font-size:20px; } .pl-card .pn { font-weight:800; font-size:15px; margin-top:2px; }
  .board-wrap { display:flex; justify-content:center; }
  #board { background:var(--board); border-radius:12px; box-shadow:var(--shadow); touch-action:manipulation; }
  .game-msg { text-align:center; font-weight:700; margin:12px 0 4px; min-height:22px; color:var(--orange-deep); }
  .game-btns { display:flex; gap:10px; margin-top:10px; }
  .game-btns .btn { padding:12px 0; font-size:14px; }
  .setup-note { font-size:12px; color:var(--sub); text-align:center; margin-top:8px; }

  /* 대국 가로모드 최적화 (태블릿): 판은 왼쪽 크게, 컨트롤은 오른쪽 세로 배치 */
  @media (orientation: landscape) {
    .rotate-hint { display:none; }
    #gameArea.active {
      display:grid;
      width:100vw; margin-left:50%; transform:translateX(-50%);   /* .wrap 520px 제약을 벗어나 전체 폭 사용 */
      padding:6px 20px 0;
      grid-template-columns:auto minmax(170px, 280px);
      grid-template-areas:
        "board players"
        "board msg"
        "board opts"
        "board btns"
        "board .";
      justify-content:center; align-items:start; gap:8px 24px;
    }
    #gameArea.active .board-wrap { grid-area:board; }
    #gameArea.active .players   { grid-area:players; flex-direction:column; gap:8px; margin:0; }
    #gameArea.active .game-msg  { grid-area:msg; margin:4px 0; }
    #gameArea.active .opts      { grid-area:opts; flex-direction:column; gap:10px; margin:2px 0; }
    #gameArea.active .game-btns { grid-area:btns; flex-direction:column; margin:0; }
  }

  .banner-warn { background:#fff3d6; border:1px solid #ffd873; color:#8a6d1a; border-radius:12px;
    padding:12px 14px; font-size:13px; margin-bottom:12px; }

  /* 연승 뱃지 */
  .streak { display:inline-block; margin-left:6px; font-size:12px; font-weight:800; color:#e8590c; }
  /* 게임 옵션 토글 */
  .opts { display:flex; justify-content:center; gap:18px; margin:10px 0 2px; }
  .opt { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--sub); font-weight:600; cursor:pointer;
    user-select:none; }
  .opt input { width:38px; height:22px; -webkit-appearance:none; appearance:none; background:#e5d8c8;
    border-radius:999px; position:relative; transition:background .2s; flex:none; }
  .opt input:checked { background:var(--orange); }
  .opt input::after { content:""; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%;
    background:#fff; transition:transform .2s; }
  .opt input:checked::after { transform:translateX(16px); }
  /* 최근 경기 피드 */
  .feed-title { font-size:15px; font-weight:800; margin:18px 4px 8px; color:var(--text); }
  .feed { background:#fff; border-radius:16px; box-shadow:var(--shadow); padding:6px 14px; }
  .feed-row { display:flex; align-items:center; gap:8px; padding:10px 0; border-bottom:1px solid #f4ece1; font-size:13.5px; }
  .feed-row:last-child { border-bottom:none; }
  .feed-row .vs { flex:1; }
  .feed-row .w { font-weight:800; } .feed-row .l { color:var(--sub); }
  /* 관리 버튼 */
  .mini-btns { display:flex; gap:8px; margin-top:18px; }
  .mini-btn { flex:1; border:2px solid #f0e5d8; background:#fffdf9; color:var(--sub); border-radius:12px;
    padding:11px 0; font-size:13.5px; font-weight:700; cursor:pointer; }
  .mini-btn.danger { color:#e03131; border-color:#ffd0d0; }

  /* 관리자 모드 */
  .admin-tools { display:flex; gap:8px; margin-bottom:14px; }
  .admin-tools .mini-btn { margin-top:0; }
  .admin-card { border:2px solid #f0e5d8; border-radius:14px; padding:12px; margin-bottom:12px; }
  .admin-name { font-weight:800; font-size:15px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .admin-name .tiny { margin-left:auto; }
  .tiny { border:1px solid #e5d8c8; background:#fffdf9; color:var(--sub); border-radius:8px; padding:4px 8px;
    font-size:11.5px; font-weight:700; cursor:pointer; margin-left:4px; }
  .tiny.danger { color:#e03131; border-color:#ffd0d0; }
  .tiny.on { background:var(--orange); color:#fff; border-color:var(--orange); }
  .admin-fields { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
  .admin-fields label { display:flex; flex-direction:column; font-size:11px; color:var(--sub); font-weight:700; gap:3px; margin:0; }
  .admin-fields input, .admin-fields select { padding:8px; font-size:14px; border:2px solid #f0e5d8; border-radius:9px;
    background:#fffdf9; -webkit-appearance:none; appearance:none; width:100%; }
  .season-reset { text-align:center; margin:20px 0 4px; }
  .season-reset button { background:none; border:none; color:#c9b8a6; font-size:12.5px; text-decoration:underline;
    cursor:pointer; }

  /* 상점 */
  #shopView { display:none; }
  .shop-head { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .shop-head select { flex:1; padding:12px 14px; font-size:15px; border:2px solid #f0e5d8; border-radius:12px;
    background:#fffdf9; -webkit-appearance:none; appearance:none; font-weight:700; }
  .pts-badge { flex:none; background:linear-gradient(135deg,#ffd24d,#ffb300); color:#7a4d00; font-weight:800;
    padding:11px 14px; border-radius:12px; font-size:15px; box-shadow:var(--shadow); white-space:nowrap; }
  .shop-sec-title { font-size:15px; font-weight:800; margin:16px 4px 10px; }
  .shop-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .shop-item { background:#fff; border-radius:16px; box-shadow:var(--shadow); padding:12px; text-align:center;
    border:3px solid transparent; position:relative; overflow:hidden; }
  .shop-item.equipped { border-color:var(--orange); }
  .shop-item .prev { height:88px; border-radius:12px; margin-bottom:8px; display:flex; align-items:center;
    justify-content:center; gap:8px; }
  .shop-item .iname { font-weight:700; font-size:14px; }
  .shop-item .iprice { font-size:12.5px; color:var(--sub); margin-top:2px; }
  .shop-btn { margin-top:8px; width:100%; border:none; border-radius:10px; padding:9px 0; font-size:13px;
    font-weight:800; cursor:pointer; }
  .shop-btn.buy { background:linear-gradient(135deg,var(--orange-deep),var(--orange)); color:#fff; }
  .shop-btn.buy:disabled { background:#eadfce; color:#b3a595; cursor:default; }
  .shop-btn.equip { background:#fff; color:var(--orange-deep); border:2px solid var(--orange); }
  .shop-btn.on { background:var(--orange); color:#fff; }
  .owned-tag { position:absolute; top:8px; right:8px; background:#5cb85c; color:#fff; font-size:10.5px; font-weight:800;
    padding:2px 7px; border-radius:999px; }
  .prev-stone { width:34px; height:34px; border-radius:50%; box-shadow:inset -3px -3px 6px rgba(0,0,0,0.25); }
  .prev-line { position:relative; width:70%; height:70%; }
  .prev-line::before, .prev-line::after { content:""; position:absolute; background:currentColor; opacity:.7; }
  .prev-line::before { left:50%; top:0; bottom:0; width:1.5px; transform:translateX(-50%); }
  .prev-line::after { top:50%; left:0; right:0; height:1.5px; transform:translateY(-50%); }

  /* 컨페티 */
  #confetti { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:200; display:none; }
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<header>
  <h1>🏆 우리 반 오목 랭킹</h1>
  <p>직접 두고, 이기고, 티어를 올려보자</p>
</header>

<div class="tabs">
  <div class="tab active" id="tabRank" onclick="switchTab('rank')">🏅 랭킹</div>
  <div class="tab" id="tabOmok" onclick="switchTab('omok')">⚫ 오목</div>
  <div class="tab" id="tabChess" onclick="switchTab('chess')">♟️ 체스</div>
  <div class="tab" id="tabJanggi" onclick="switchTab('janggi')">🏯 장기</div>
  <div class="tab" id="tabShop" onclick="switchTab('shop')">🛍️ 상점</div>
</div>

<div class="wrap">
  <!-- 랭킹 화면 -->
  <div id="rankView">
    <div id="tierGuide"></div>
    <div id="list"></div>
    <div id="feedWrap"></div>
    <div class="season-reset" id="seasonResetWrap">

// ---------- 소리 / 진동 ----------
let audioCtx = null;
function beep(freq, dur, type = "sine", vol = 0.15) {
  if (!settings.sound) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
function vibrate(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }
const sfx = {
  place() { beep(440, 0.08, "triangle"); vibrate(10); },
  deny()  { beep(160, 0.18, "sawtooth", 0.12); vibrate([30, 40, 30]); },
  win()   { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.18, "sine", 0.18), i * 110)); vibrate([40, 30, 80]); },
  draw()  { beep(330, 0.2, "sine", 0.12); },
};

// ---------- Supabase 호출 래퍼 ----------
async function fetchStudents() {
  const { data, error } = await sb.from("students").select("*");
  if (error) throw error;
  const list = data.map(s => ({ ...s }));
  list.sort((a,b) => tIdx(b.tier)-tIdx(a.tier) || b.lp-a.lp || b.wins-a.wins);
  let rank = 0;
  list.forEach(s => {
    const g = s.wins + s.losses;
    s.games = g;
    s.win_rate = g ? Math.round(s.wins/g*1000)/10 : 0;
    s.rank = s.is_tester ? null : (++rank);   // 테스터는 랭킹에서 제외
  });
  return list;
}
function tIdx(t){ return TIERS.indexOf(t); }

async function addStudent(name, password) {
  const { error } = await sb.rpc("register_student", { p_name: name, p_password: password });
  if (error) throw new Error(error.message);
}
async function verifyStudent(id, password) {
  const { data, error } = await sb.rpc("verify_student", { p_id: id, p_password: password });
  if (error) throw new Error(error.message);
  return data === true;
}
async function adminLogin(pw) {
  const { data, error } = await sb.rpc("is_admin", { p_pw: pw });
  if (error) throw new Error(error.message);
  return data === true;
}
async function adminRpc(fn, params) {
  const { error } = await sb.rpc(fn, params);
  if (error) throw new Error(error.message);
}
async function recordMatch(winnerId, loserId) {
  const { data, error } = await sb.rpc("record_match", { p_winner_id: winnerId, p_loser_id: loserId });
  if (error) throw new Error(error.message);
  return data;
}
async function pairBlocked(aId, bId) {
  // a의 최근 2경기가 모두 b 상대면 연속 2판 -> 3번째 금지
  const { data } = await sb.from("match_history").select("winner_id,loser_id")
    .or(`winner_id.eq.${aId},loser_id.eq.${aId}`).order("id", { ascending: false }).limit(2);
  return !!(data && data.length === 2 && data.every(m => m.winner_id === bId || m.loser_id === bId));
}
async function saveGameRecord(gameType, p1, p2, winnerId, result, moves) {
  try {
    await sb.from("game_records").insert({
      game_type: gameType, p1_id: p1.id, p1_name: p1.name, p2_id: p2.id, p2_name: p2.name,
      winner_id: winnerId, result, moves,
    });
  } catch (e) { /* 저장 실패해도 게임 진행엔 영향 없음 */ }
}
async function fetchGameRecords(studentId, limit = 20) {
  const { data, error } = await sb.from("game_records").select("*")
    .or(`p1_id.eq.${studentId},p2_id.eq.${studentId}`).order("id", { ascending: false }).limit(limit);
  if (error) throw error;
  return data || [];
}
async function fetchRecentMatches(limit = 10) {
  const { data, error } = await sb.from("match_history").select("*").order("id", { ascending: false }).limit(limit);
  if (error) throw error;
  return data || [];
}

// ---------- 랭킹 렌더 ----------
async function loadStudents() {
  const el = document.getElementById("list");
  if (!configured) {
    el.innerHTML = `<div class="banner-warn">⚙️ 아직 Supabase 설정 전입니다.<br>
      <b>index.html</b> 상단의 <code>SUPABASE_URL</code>, <code>SUPABASE_ANON_KEY</code> 를 채워주세요.<br>
      (배포가이드.md 참고)</div>`;
    return;
  }
  try {
    await loadShopCatalog();
    students = await fetchStudents();
    renderList(); fillSelects(); loadFeed();
    if(document.getElementById("shopView").style.display === "block") renderShop();
    setupRealtime();
  } catch (e) {
    el.innerHTML = `<div class="empty">데이터를 불러올 수 없습니다.<br>${e.message}</div>`;
  }
}

async function loadFeed() {
  const wrap = document.getElementById("feedWrap");
  try {
    const rows = await fetchRecentMatches(10);
    if (!rows.length) { wrap.innerHTML = ""; return; }
    wrap.innerHTML = `<div class="feed-title">📜 최근 경기</div><div class="feed">` +
      rows.map(m => `<div class="feed-row">
        <span>⚔️</span>
        <span class="vs"><span class="w">${esc(m.winner_name)}</span>
          <span style="color:var(--sub)"> 승 · </span><span class="l">${esc(m.loser_name)}</span></span>
        <span class="lp-up">+${m.winner_lp_change}</span></div>`).join("") + `</div>`;
  } catch (e) { wrap.innerHTML = ""; }
}

// ---------- 실시간 동기화 ----------
let realtimeReady = false, realtimeTimer = null;
function setupRealtime() {
  if (realtimeReady || !sb) return;
  realtimeReady = true;
  const refresh = () => {
    clearTimeout(realtimeTimer);
    realtimeTimer = setTimeout(() => { loadStudents(); }, 400); // 짧게 디바운스
  };
  sb.channel("omok-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "students" }, refresh)
    .on("postgres_changes", { event: "*", schema: "public", table: "match_history" }, refresh)
    .subscribe();
}
function tierPill(t){ return `<span class="tier-pill" style="background:${TIER_COLORS[t]||'#999'}">${TIER_EMOJI[t]||''} ${t}</span>`; }
function renderTierGuide(){
  const el = document.getElementById("tierGuide"); if(!el) return;
  el.innerHTML = `<div class="tier-guide">` +
    TIERS.map((t,i) => `<div class="tg-item" style="border-color:${TIER_COLORS[t]}">
        <div class="tg-em">${TIER_EMOJI[t]}</div><div class="tg-nm">${t}</div></div>` +
      (i < TIERS.length-1 ? `<div class="tg-arrow">›</div>` : "")).join("") +
    `</div><div class="tg-note">💯 100 LP 모으면 다음 티어로 승급! · 승 +15 / 패 −10 (상대 티어에 따라 조금씩 달라져요)</div>`;
}
function nextTierText(s){
  if(s.tier === "다이아몬드") return "👑 최고 티어";
  const idx = tIdx(s.tier);
  const next = ["브론즈","실버","골드","플래티넘","다이아몬드"][idx+1];
  return `🔼 ${next}까지 ${100 - s.lp}LP`;
}
function renderList() {
  const el = document.getElementById("list");
  const ranked = students.filter(s => !s.is_tester);   // 테스터 제외
  if (!ranked.length) {
    el.innerHTML = `<div class="empty">아직 등록된 학생이 없어요.<br>아래 <b>학생 등록</b>으로 시작해 보세요!</div>`;
    return;
  }
  el.innerHTML = ranked.map(s => `
    <div class="card" onclick="openDetail(${s.id})">
      <div class="rank-badge rank-${s.rank<=3?s.rank:'n'}">${s.rank}</div>
      <div class="info">
        <div class="name">${esc(s.name)}${s.streak>=2?`<span class="streak">🔥${s.streak}연승</span>`:""}</div>
        <div class="sub">${tierPill(s.tier)} &nbsp; ${s.wins}승 ${s.losses}패 · 승률 ${s.win_rate}%</div>
        <div class="gauge"><div style="width:${s.lp}%"></div></div>
      </div>
      <div class="lp-box"><div class="lp">${s.lp}<small>LP</small></div>
        <div class="next-tier">${nextTierText(s)}</div></div>
    </div>`).join("");
}
function fillSelects() {
  const byName = [...students].sort((a, b) => a.name.localeCompare(b.name, "ko"));  // 가나다 순
  const nm = s => (s.is_tester ? "🧪 " : "") + esc(s.name);
  const opts = byName.map(s => `<option value="${s.id}">${nm(s)} (${s.tier} ${s.lp}LP)</option>`).join("");
  ["winnerSel","loserSel","blackSel","whiteSel"].forEach(id => {
    const sel = document.getElementById(id); const prev = sel.value;
    sel.innerHTML = opts; if (prev) sel.value = prev;
  });

  shop.innerHTML = byName.map(s => `<option value="${s.id}">${nm(s)} · 💰${s.points||0}P</option>`).join("");
  if (prevS) shop.value = prevS;
}

  const name = document.getElementById("newName").value.trim();
  const pw = document.getElementById("newPw").value;
  if(!name){ alert("이름을 입력해 주세요."); return; }
  if(!pw){ alert("비밀번호를 입력해 주세요."); return; }
  try {
    await addStudent(name, pw);
    document.getElementById("newPw").value = "";
    closeModal("addBack"); await loadStudents();
  } catch(e){ alert(e.message); }
}
async function submitManualMatch() {
  const w = +document.getElementById("winnerSel").value, l = +document.getElementById("loserSel").value;
  const wPw = document.getElementById("winnerPw").value, lPw = document.getElementById("loserPw").value;
  if(w===l){ alert("승자와 패자가 같을 수 없어요."); return; }
  if(!wPw || !lPw){ alert("두 학생 모두 비밀번호를 입력해야 합니다."); return; }
  try {
    const [wOk, lOk] = await Promise.all([verifyStudent(w, wPw), verifyStudent(l, lPw)]);
    if(!wOk) throw new Error("승자의 비밀번호가 틀립니다.");
    if(!lOk) throw new Error("패자의 비밀번호가 틀립니다.");
    const r = await recordMatch(w,l);
    document.getElementById("winnerPw").value = ""; document.getElementById("loserPw").value = "";
    closeModal("matchBack"); await loadStudents(); showResultToast(r);
  } catch(e){ alert(e.message); }
}

function showResultToast(r) {
  const w=r.winner, l=r.loser; let extra="";
  if(w.promoted) extra += `<div class="promo">🎉 ${esc(w.name)} 승급! → ${w.new_tier}</div>`;
  if(l.demoted)  extra += `<div class="promo" style="color:var(--down)">⬇️ ${esc(l.name)} 강등… → ${l.new_tier}</div>`;
  if(w.streak>=3) extra += `<div class="promo" style="color:#e8590c">🔥 ${esc(w.name)} ${w.streak}연승 중!</div>`;
  const t = document.getElementById("toast");
  const wp = w.points_gain ? ` <span style="color:#e0a800">+${w.points_gain}P</span>` : "";
  const lp2 = l.points_gain ? ` <span style="color:#e0a800">+${l.points_gain}P</span>` : "";
  t.innerHTML = `<div style="font-weight:800;margin-bottom:8px;">대국 결과</div>
    <div class="t-row"><span>🥇 ${esc(w.name)}</span><span><span class="lp-up pop">+${w.lp_change} LP</span>${wp}</span></div>
    <div class="t-row"><span>🥈 ${esc(l.name)}</span><span><span class="lp-down pop">${l.lp_change} LP</span>${lp2}</span></div>${extra}`;
  t.classList.add("show");
  if(w.promoted) confetti();   // 승급은 (직접 입력이든 대국이든) 축하
  clearTimeout(window._tt); window._tt = setTimeout(()=>t.classList.remove("show"), 3400);
}

function stonePrevStyle(data, side) {

function isDefaultItem(it) { return it.id === "board_wood" || it.id === "stone_ink"; }

function renderShop() {

function shopSection(title, items, s, owned) {

function shopCard(it, s, owned) {
  const free = it.price === 0;
  const has = free || owned.has(it.id);
  const equipField = it.kind === "board" ? s.equip_board : s.equip_stone;
  const equipped = equipField === it.id || (free && isDefaultItem(it) && !equipField);
  let prev;
  if (it.kind === "board") {
    prev = `<div class="prev" style="background:${it.data.bg};color:${it.data.line}"><div class="prev-line"></div></div>`;
  } else {
    prev = `<div class="prev" style="background:#efe2cf">
      <div class="prev-stone" style="${stonePrevStyle(it.data,'black')}"></div>
      <div class="prev-stone" style="${stonePrevStyle(it.data,'white')}"></div></div>`;
  }
  let btn;
  if (equipped) btn = `<button class="shop-btn on" disabled>✓ 장착 중</button>`;
  else if (has) btn = `<button class="shop-btn equip" onclick="equipItem(${s.id},'${it.id}')">장착하기</button>`;
  else {
    const can = (s.points || 0) >= it.price;
    btn = `<button class="shop-btn buy" ${can ? "" : "disabled"} onclick="buyItem(${s.id},'${it.id}')">💰 ${it.price}P ${can ? "구매" : "부족"}</button>`;
  }
  return `<div class="shop-item ${equipped ? 'equipped' : ''}">
    ${has && !free ? '<span class="owned-tag">보유</span>' : ''}
    ${prev}
    <div class="iname">${esc(it.name)}</div>
    <div class="iprice">${free ? '기본 제공' : it.price + ' P'}</div>

}

// 게임에 적용할 스킨 해석
function resolveStone(equipId, side) {
  const it = SHOP[equipId];
  if (it && it.data) {
    if (it.data.black || it.data.white) return side === "white" ? it.data.white : it.data.black;
    return it.data;
  }
  return side === "white" ? { in:"#fff", out:"#cfd3d8" } : { in:"#555", out:"#111" };
}
function hasCustomBoard(s){
  return !!(s && s.equip_board && s.equip_board !== "board_wood" && SHOP[s.equip_board]);
}
function resolveGameSkins(black, white, boardOwner) {
  let board;
  if(boardOwner && SHOP[boardOwner.equip_board]) board = SHOP[boardOwner.equip_board].data;   // 선택된 학생 판
  else board = (SHOP[black.equip_board] && SHOP[black.equip_board].data)
             || (SHOP[white.equip_board] && SHOP[white.equip_board].data) || DEFAULT_BOARD;
  const stone = {};
  stone[Omok.BLACK] = resolveStone(black.equip_stone, "black");
  stone[Omok.WHITE] = resolveStone(white.equip_stone, "white");
  return { board, stone };
}

// ==================== 컨페티 ====================
function confetti() {
  const cv = document.getElementById("confetti"), cx = cv.getContext("2d");
  cv.style.display = "block"; cv.width = innerWidth; cv.height = innerHeight;
  const colors = ["#ff8a3d","#ffcf5c","#ff5a5a","#5b8dff","#5cb85c","#c9a0ff"];
  const parts = Array.from({ length: 130 }, () => ({
    x: innerWidth/2 + (Math.random()*2-1)*60, y: innerHeight*0.28,
    vx: (Math.random()*2-1)*6, vy: Math.random()*-9-3, g: 0.24,
    s: Math.random()*6+4, c: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*6, vr: (Math.random()*2-1)*0.3,
  }));
  let f = 0;
  (function tick() {
    cx.clearRect(0,0,cv.width,cv.height); f++;
    parts.forEach(p => {
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
      cx.fillStyle = p.c; cx.fillRect(-p.s/2, -p.s/2, p.s, p.s*0.6); cx.restore();
    });
    if (f < 170) requestAnimationFrame(tick);
    else { cx.clearRect(0,0,cv.width,cv.height); cv.style.display = "none"; }
  })();
}

let game = null;
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
let CELL = 24, PAD = 18, BSIZE = 0;

function sizeBoard() {
  const landscape = window.innerWidth > window.innerHeight;
  const header = document.querySelector("header");
  const tabs = document.querySelector(".tabs");
  const chromeTop = (header ? header.offsetHeight : 90) + (tabs ? tabs.offsetHeight : 48);
  let availW, availH;
  if (landscape) {
    // 판은 왼쪽, 오른쪽 컨트롤 패널(~280) + 여백을 뺀 폭 / 화면 높이에서 헤더·탭 제외
    availW = window.innerWidth - 300 - 60;
    availH = window.innerHeight - chromeTop - 24;
  } else {
    availW = Math.min(document.querySelector(".wrap").clientWidth, 460);
    // 위(플레이어 카드·안내)와 아래(옵션·메시지·버튼) 영역을 대략 제외
    availH = window.innerHeight - chromeTop - 250;
  }
  const size = Math.max(220, Math.min(availW, availH));
  CELL = Math.floor((size - PAD*2) / (Omok.N - 1));
  BSIZE = CELL*(Omok.N-1) + PAD*2;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = BSIZE*dpr; canvas.height = BSIZE*dpr;
  canvas.style.width = BSIZE+"px"; canvas.style.height = BSIZE+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

async function startGame() {
  if(needConfig()) return;
  if(students.length < 2){ alert("학생이 2명 이상 필요해요. (랭킹 탭에서 등록)"); return; }
  const bId = +document.getElementById("blackSel").value;
  const wId = +document.getElementById("whiteSel").value;
  if(bId === wId){ alert("흑돌과 백돌은 다른 학생이어야 해요."); return; }
  const blackS = students.find(s=>s.id===bId), whiteS = students.find(s=>s.id===wId);
  const testerInvolved = blackS.is_tester || whiteS.is_tester;
  gameRanked = matchMode === "ranked" && !testerInvolved;   // 테스터 끼면 무조건 친선(랭킹 미반영)
  if(gameRanked && await pairBlocked(bId, wId)){ alert("같은 친구와는 연속 2판까지예요! 다른 친구와 한 판 두고 오세요. 🔄"); return; }
  const bPw = document.getElementById("blackPw").value;
  const wPw = document.getElementById("whitePw").value;
  if(!bPw || !wPw){ alert("두 학생 모두 비밀번호를 입력해야 합니다."); return; }
  const black = students.find(s=>s.id===bId), white = students.find(s=>s.id===wId);
  const btn = document.getElementById("startBtn"); btn.disabled = true; btn.textContent = "확인 중…";
  try {
    const [bOk, wOk] = await Promise.all([verifyStudent(bId, bPw), verifyStudent(wId, wPw)]);
    if(!bOk && !wOk) throw new Error("두 학생의 비밀번호가 모두 틀립니다.");
    if(!bOk) throw new Error(`⚫ ${black.name} 님의 비밀번호가 틀립니다.`);
    if(!wOk) throw new Error(`⚪ ${white.name} 님의 비밀번호가 틀립니다.`);
    document.getElementById("blackPw").value = ""; document.getElementById("whitePw").value = "";
    if(gameType === "chess") beginChess(white, black);       // 체스: white 슬롯=백(선공)
    else if(gameType === "janggi") beginJanggi(white, black); // 장기: white 슬롯=한(아래·선공)
    else {
      let owner = null;   // 둘 다 커스텀 바둑판이 있으면 누구 판으로 둘지 선택
      if(hasCustomBoard(black) && hasCustomBoard(white))
        owner = confirm(`두 학생 모두 바둑판 스킨이 있어요! 누구 판으로 둘까요?\n\n[확인] ⚫ ${black.name} 님 판\n[취소] ⚪ ${white.name} 님 판`) ? black : white;
      beginGame(black, white, owner);
    }
  } catch(e){ alert(e.message); }
  finally { btn.disabled = false; btn.textContent = "🔒 확인하고 대국 시작!"; }
}

function beginGame(black, white, boardOwner) {

function draw() {
  const skin = (game && game.skins && game.skins.board) || DEFAULT_BOARD;
  canvas.style.background = skin.bg;
  ctx.clearRect(0,0,BSIZE,BSIZE);
  ctx.strokeStyle = skin.line; ctx.lineWidth = 1;
  for(let i=0;i<Omok.N;i++){
    const p = PAD + i*CELL;
    ctx.beginPath(); ctx.moveTo(PAD,p); ctx.lineTo(BSIZE-PAD,p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p,PAD); ctx.lineTo(p,BSIZE-PAD); ctx.stroke();
  }
  // 화점
  ctx.fillStyle = skin.star || skin.line;
  [[3,3],[3,11],[11,3],[11,11],[7,7]].forEach(([r,c])=>{
    ctx.beginPath(); ctx.arc(PAD+c*CELL, PAD+r*CELL, 3, 0, 7); ctx.fill();
  });
  // 돌
  for(let r=0;r<Omok.N;r++) for(let c=0;c<Omok.N;c++){
    if(game.board[r][c]) drawStone(r,c,game.board[r][c], false);
  }
  // 마지막 수 표시
  const last = game.history[game.history.length-1];
  if(last){ drawStone(last.r,last.c,game.board[last.r][last.c], true); }
  // 금수 자리 미리보기 (흑 차례에만)
  if(settings.forbidden && !game.over && game.turn===Omok.BLACK){
    ctx.strokeStyle = "#e03131"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
    const d = CELL*0.22;
    for(const [r,c] of Omok.forbiddenPoints(game.board)){
      const x = PAD+c*CELL, y = PAD+r*CELL;
      ctx.beginPath(); ctx.moveTo(x-d,y-d); ctx.lineTo(x+d,y+d);
      ctx.moveTo(x+d,y-d); ctx.lineTo(x-d,y+d); ctx.stroke();
    }
    ctx.lineWidth = 1; ctx.lineCap = "butt";
  }
}
function drawStone(r,c,color,mark){
  const x = PAD+c*CELL, y = PAD+r*CELL, rad = CELL*0.42;
  const st = (game && game.skins && game.skins.stone[color])
          || (color===Omok.BLACK ? {in:"#555",out:"#111"} : {in:"#fff",out:"#cfd3d8"});
  if(st.glow){ ctx.save(); ctx.shadowColor = st.glow; ctx.shadowBlur = CELL*0.35; }
  ctx.beginPath(); ctx.arc(x,y,rad,0,7);
  const g = ctx.createRadialGradient(x-rad*0.3,y-rad*0.3,rad*0.1,x,y,rad);
  g.addColorStop(0, st.in); g.addColorStop(1, st.out);
  ctx.fillStyle = g; ctx.fill();
  if(st.glow) ctx.restore();
  ctx.strokeStyle = "rgba(0,0,0,0.25)"; ctx.lineWidth = 1; ctx.stroke();
  if(mark){ ctx.beginPath(); ctx.arc(x,y,rad*0.28,0,7);
    ctx.fillStyle = color===Omok.BLACK ? "#fff" : "#ff6f1f"; ctx.fill(); }
}
function getCSS(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

canvas.addEventListener("click", (e) => {
  if(!game || game.over) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const c = Math.round((x-PAD)/CELL), r = Math.round((y-PAD)/CELL);
  if(r<0||r>=Omok.N||c<0||c>=Omok.N) return;
  tryMove(r,c);
});

function tryMove(r,c) {
  if(game.board[r][c] !== Omok.EMPTY) return;
  const color = game.turn;
  const res = Omok.analyze(game.board, r, c, color);
  if(color===Omok.BLACK && res.forbidden){
    sfx.deny();
    flashMsg(`❌ 금수: ${res.forbidden} — 다른 곳에 두세요`);
    return;
  }
  game.board[r][c] = color;
  game.history.push({r,c});
  sfx.place();
  if(res.win){ endGame(color); return; }        // endGame/endDraw 가 draw() 수행
  if(Omok.isFull(game.board)){ endDraw(); return; }
  game.turn = color===Omok.BLACK ? Omok.WHITE : Omok.BLACK;
  draw();   // 턴을 넘긴 뒤 그려야 금수 표시(흑 전용)가 백 차례에 남지 않음
  updateTurnUI();
}

function undoMove() {
  if(!game || game.over || !game.history.length) return;
  const last = game.history.pop();
  game.board[last.r][last.c] = Omok.EMPTY;
  game.turn = game.turn===Omok.BLACK ? Omok.WHITE : Omok.BLACK;
  draw(); updateTurnUI();
}

function renderChess(){
  const b = chessGame.state.board, turn = chessGame.state.turn;
  const el = document.getElementById("chessBoard"); el.innerHTML = "";
  const legalSet = new Set(chessGame.legal.map(m => m[0]+","+m[1]));
  const chkKing = (!chessGame.over && Chess.inCheck(b, turn)) ? Chess.kingPos(b, turn) : null;
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const sq = document.createElement("div");

    if(chessGame.sel && chessGame.sel[0]===r && chessGame.sel[1]===c) sq.classList.add("sel");
    if(legalSet.has(r+","+c)){ sq.classList.add("legal"); if(b[r][c]) sq.classList.add("cap"); }
    if(chkKing && chkKing[0]===r && chkKing[1]===c) sq.classList.add("chk");
    const p = b[r][c];
    if(p){ const sp=document.createElement("span"); sp.className="cpiece "+(Chess.colorOf(p)==="w"?"cw":"cb"); sp.textContent=CG[Chess.typeOf(p)]; sq.appendChild(sp); }
    sq.onclick = () => chessClick(r,c);
    el.appendChild(sq);
  }
  document.getElementById("cpWhite").classList.toggle("turn", turn==="w" && !chessGame.over);
  document.getElementById("cpBlack").classList.toggle("turn", turn==="b" && !chessGame.over);
  if(!chessGame.over){
    const nm = turn==="w" ? chessGame.white.name : chessGame.black.name;

    document.getElementById("chessMsg").textContent = `${turn==="w"?"⚪ 백":"⚫ 흑"} (${nm}) 차례${chk}`;

let pendingPromo = null;
function chessClick(r,c){
  if(!chessGame || chessGame.over) return;
  const st = chessGame.state, p = st.board[r][c];
  if(chessGame.sel && chessGame.legal.some(m => m[0]===r && m[1]===c)){
    if(Chess.isPromotion(st, chessGame.sel, [r,c])){      // 승격이면 기물 선택창
      pendingPromo = { from: chessGame.sel, to: [r,c] };
      chessGame.sel = null; chessGame.legal = []; renderChess();
      document.getElementById("promoPicker").classList.add("show");
      return;
    }
    doChessMove(chessGame.sel, [r,c]); return;
  }
  if(p && Chess.colorOf(p)===st.turn){ chessGame.sel=[r,c]; chessGame.legal=Chess.legalMoves(st,r,c); renderChess(); }
  else { chessGame.sel=null; chessGame.legal=[]; renderChess(); }
}
function choosePromo(pc){
  document.getElementById("promoPicker").classList.remove("show");
  if(pendingPromo){ const { from, to } = pendingPromo; pendingPromo = null; doChessMove(from, to, pc); }
}
function doChessMove(from, to, promo){
  const st = chessGame.state, mover = st.turn;
  chessGame.moves.push([from[0], from[1], to[0], to[1], promo]);
  chessGame.state = Chess.applyMove(st, from, to, promo);   // promo 없으면 기본 퀸
  chessGame.sel = null; chessGame.legal = [];
  sfx.place();
  renderChess();
  const stt = Chess.status(chessGame.state);
  if(stt === "checkmate"){ endChess(mover); return; }
  if(stt === "stalemate"){ chessDraw(); return; }
}

}

      <div class="tg-note" style="margin:0 0 10px">대국을 눌러 수순을 하나씩 되짚어 보며 배워요 🧠</div>
      ${list}
      <button class="mini-btn" style="margin-top:12px" onclick="openDetail(${id})">← 돌아가기</button>`;
  } catch(e){ body.innerHTML = `<div class="empty">${e.message}</div>`; }
}
function replayRow(g, viewerId){
  const icon = g.game_type === "omok" ? "⚫" : g.game_type === "chess" ? "♟️" : "🏯";
  const opp = g.p1_id === viewerId ? g.p2_name : g.p1_name;
  const res = g.result === "draw" ? '<span style="color:var(--sub)">무</span>'
    : g.winner_id === viewerId ? '<span class="lp-up">승</span>' : '<span class="lp-down">패</span>';
  return `<div class="feed-row" style="cursor:pointer" onclick="openReplay(${g.id})">
    <span>${icon}</span><span class="vs">vs ${esc(opp)} · ${g.moves.length}수</span>${res}
    <span style="color:var(--orange-deep);font-weight:800">▶</span></div>`;
}
function openReplay(gameId){
  const g = replayGames[gameId]; if(!g) return;
  review = { game: g, idx: g.moves.length };
  const resultTxt = g.result === "draw" ? "무승부"
    : (g.winner_id === g.p1_id ? g.p1_name : g.p2_name) + " 승";
  document.getElementById("replayBody").innerHTML = `
    <span class="close-x" onclick="closeModal('replayBack')">✕</span>
    <h2>${GAME_LABEL[g.game_type]} 복기</h2>
    <div class="tg-note" style="margin:0 0 8px">${esc(g.p1_name)} vs ${esc(g.p2_name)} · ${esc(resultTxt)}</div>
    <div class="board-wrap"><div id="replayBoard"></div></div>
    <div class="game-btns" style="margin-top:12px">
      <button class="btn btn-ghost" onclick="replaySeek(0)">⏮</button>
      <button class="btn btn-ghost" onclick="replayStep(-1)">◀ 이전</button>
      <button class="btn btn-primary" id="replayCount"></button>
      <button class="btn btn-ghost" onclick="replayStep(1)">다음 ▶</button>
      <button class="btn btn-ghost" onclick="replaySeek(review.game.moves.length)">⏭</button>
    </div>`;
  openModal("replayBack");
  renderReplay();
}
function replayStep(d){ const n = review.game.moves.length; review.idx = Math.max(0, Math.min(n, review.idx + d)); renderReplay(); }
function replaySeek(i){ review.idx = i; renderReplay(); }

function reconstructChess(moves, upto){
  let s = Chess.initialState();
  for(let i=0;i<upto;i++){ const m = moves[i]; s = Chess.applyMove(s, [m[0],m[1]], [m[2],m[3]], m[4]); }
  return s.board;
}
function reconstructJanggi(moves, upto){
  let s = Janggi.initialState();
  for(let i=0;i<upto;i++){ const m = moves[i]; s = Janggi.applyMove(s, [m[0],m[1]], [m[2],m[3]]).state; }
  return s.board;
}
function renderReplay(){
  const g = review.game, idx = review.idx, el = document.getElementById("replayBoard");
  const last = idx > 0 ? g.moves[idx-1] : null;
  if(g.game_type === "omok") el.innerHTML = replayOmokHTML(g.moves, idx, last);
  else if(g.game_type === "chess") el.innerHTML = replayGridHTML(reconstructChess(g.moves, idx), 8, 8, "chess", last);
  else el.innerHTML = replayGridHTML(reconstructJanggi(g.moves, idx), 10, 9, "janggi", last);
  document.getElementById("replayCount").textContent = `${idx} / ${g.moves.length} 수`;
}
function replayOmokHTML(moves, upto, last){
  const N = 15, b = Array.from({length:N},()=>Array(N).fill(0));
  for(let i=0;i<upto;i++){ const [r,c] = moves[i]; b[r][c] = i % 2 === 0 ? 1 : 2; }
  let h = `<div class="rgrid romok" style="grid-template-columns:repeat(${N},1fr);grid-template-rows:repeat(${N},1fr);aspect-ratio:1;width:min(84vmin,340px)">`;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    const isLast = last && last[0]===r && last[1]===c;
    const inner = b[r][c] ? `<span class="rstone ${b[r][c]===1?'bk':'wt'}"></span>` : "";
    h += `<div class="rsq${isLast?' rlast':''}">${inner}</div>`;
  }
  return h + `</div>`;
}
function replayGridHTML(board, rows, cols, type, last){
  const w = "width:min(84vmin,340px)";
  let h = `<div class="rgrid r${type}" style="grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${rows},1fr);aspect-ratio:${cols}/${rows};${w}">`;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const isLast = last && ((last[0]===r&&last[1]===c) || (last[2]===r&&last[3]===c));
    const p = board[r][c]; let extra = "", inner = "";
    if(type === "chess"){
      extra = (r+c)%2 ? "dark" : "light";
      if(p) inner = `<span class="${Chess.colorOf(p)==='w'?'rc':'rcb'}">${CG[Chess.typeOf(p)]}</span>`;
    } else {
      extra = Janggi.inPalace(r,c) ? "palace" : "";
      if(p) inner = `<span class="rdisk ${Janggi.col(p)==='r'?'jr':'jb'}">${JG[Janggi.col(p)][Janggi.typ(p)]}</span>`;
    }
    h += `<div class="rsq ${extra}${isLast?' rlast':''}">${inner}</div>`;
  }
  return h + `</div>`;
}

renderTierGuide();

loadStudents();
</script>
</body>
</html>
